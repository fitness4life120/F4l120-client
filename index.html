<title>My Fitness App | Fitness 4Life 120</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070a0c;--s1:#0c1318;--s2:#111d24;--s3:#162530;
  --b1:#1c3040;--b2:#254555;
  --teal:#1b8899;--teal2:#25b5cc;--teal3:rgba(27,136,153,0.15);
  --teal4:rgba(27,136,153,0.08);
  --gold:#c9a84c;--gold2:rgba(201,168,76,0.12);
  --green:#2dba80;--red:#e05252;
  --txt:#d8eef4;--muted:#6a9aad;--soft:#1a3545;--r:10px;
}
html,body{height:100%;background:var(--bg);overflow:hidden;-webkit-tap-highlight-color:transparent}
body{font-family:'Cabinet Grotesk',sans-serif;color:var(--txt)}
.app{height:100vh;max-width:430px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative}

/* LOGIN */
.login{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;overflow-y:auto}
.login-hero{background:linear-gradient(160deg,#0d2530 0%,#1b8899 100%);padding:60px 24px 48px;text-align:center;position:relative;overflow:hidden}
.login-hero::after{content:'120';position:absolute;right:-10px;bottom:-20px;font-family:'Clash Display',sans-serif;font-size:140px;font-weight:700;color:rgba(255,255,255,0.05);line-height:1;pointer-events:none}
.l-eye{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:12px;position:relative}
.l-title{font-family:'Clash Display',sans-serif;font-size:34px;font-weight:700;color:white;line-height:1.1;margin-bottom:8px;position:relative}
.l-sub{font-size:13px;color:rgba(255,255,255,0.55);position:relative;line-height:1.5}
.login-body{padding:32px 24px 40px;flex:1}
.pin-input-wrap{display:flex;justify-content:center;gap:12px;margin:24px 0}
.pin-digit{width:58px;height:68px;background:var(--s1);border:2px solid var(--b1);border-radius:10px;font-family:'Clash Display',sans-serif;font-size:28px;font-weight:700;color:var(--txt);text-align:center;outline:none;-webkit-appearance:none;transition:border-color 0.2s}
.pin-digit:focus{border-color:var(--teal2)}
.login-btn{width:100%;background:linear-gradient(135deg,#156878,var(--teal));color:white;border:none;border-radius:10px;padding:16px;font-family:'Clash Display',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:8px}
.login-btn:active{transform:scale(0.98)}
.login-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5}
.login-error{background:rgba(224,82,82,0.1);border:1px solid rgba(224,82,82,0.25);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;text-align:center;margin-top:12px}

/* TOP NAV */
.topnav{background:var(--s1);border-bottom:1px solid var(--b1);padding:14px 16px 0;flex-shrink:0;z-index:10}
.tn-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tn-greeting{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.tn-name{font-family:'Clash Display',sans-serif;font-size:20px;font-weight:700;color:var(--txt);line-height:1.1}
.icon-btn{width:36px;height:36px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;flex-shrink:0}
.icon-btn:active{transform:scale(0.9)}
.tabbar{display:flex;overflow-x:auto}
.tabbar::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;min-width:56px;padding:9px 10px;background:transparent;border:none;border-bottom:2px solid transparent;font-family:'Clash Display',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;white-space:nowrap}
.tab.active{color:var(--teal2);border-bottom-color:var(--teal2)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 100px}
.scroll::-webkit-scrollbar{display:none}

function urlBase64ToUint8Array(base64String){
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g,"+").replace(/_/g,"/");
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for(let i=0;i<rawData.length;i++) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

async function registerServiceWorker(){
  if(!("serviceWorker" in navigator)) return null;
  try { return await navigator.serviceWorker.register("sw.js"); }
  catch(e){ return null; }
}

async function subscribeToPush(clientId){
  if(!pushSupported()) return { ok:false, reason:"unsupported" };
  const reg = await registerServiceWorker();
  if(!reg) return { ok:false, reason:"sw_failed" };
  const permission = await Notification.requestPermission();
  if(permission !== "granted") return { ok:false, reason:"denied" };
  try {
    let sub = await reg.pushManager.getSubscription();
    if(!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    const raw = sub.toJSON();
    await api("push_subscriptions", { method:"POST", body: JSON.stringify({
      client_id: clientId, endpoint: raw.endpoint, p256dh: raw.keys.p256dh, auth: raw.keys.auth
    })}).catch(()=>{
      // endpoint already exists (unique constraint) — fine, subscription is already registered
    });
    return { ok:true };
  } catch(e){ return { ok:false, reason:"subscribe_failed", message: (e && e.message) || String(e) }; }
}

    body: file
  });

}

function getYouTubeId(url){
  if(!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function getExercisePR(logs, exerciseName){
  let best = null;
  (logs||[]).forEach(l=>{
    if(l.exercise!==exerciseName) return;
    const w = +l.weight||0;
    if(w<=0) return;
    if(!best || w>best.weight) best = {weight:w, reps:l.reps, log_type:l.log_type};
  });
  return best;
}

function groupByExercise(dayLogs){
  const map = {};
  const order = [];
  [...dayLogs].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)).forEach(l=>{
    const key = l.exercise;
    if(!map[key]){ map[key] = { exercise:l.exercise, muscle:l.muscle, notes:l.notes, from_plan:l.from_plan, sets:[] }; order.push(key); }
    if(l.notes && !map[key].notes) map[key].notes = l.notes;
    map[key].sets.push(l);
  });
  return order.map(k=>map[k]);
}

function nestBySupersetGroup(exerciseGroups){
  const result = [];
  const seen = {};
  exerciseGroups.forEach(eg=>{
    const gid = eg.sets[0] && eg.sets[0].exercise_group;
    if(!gid){ result.push({type:"single", group:eg}); return; }
    if(seen[gid]){
      const entry = result.find(r=>r.type==="superset"&&r.groupId===gid);
      if(entry) entry.groups.push(eg);
      return;
    }
    seen[gid]=true;
    result.push({type:"superset", groupId:gid, groups:[eg]});
  });
  result.forEach(r=>{ if(r.type==="superset") r.label = r.groups.length>=3?"Circuit":"Superset"; });
  return result;
}

function getWeeklyWeightRanges(progressLogs){
  const weeks = {};
  progressLogs.forEach(p=>{
    if(!p.weight) return;
    const d = new Date(p.date+"T12:00:00");
    const dow = d.getDay();
    const diffToMon = dow===0?-6:1-dow;
    const monday = new Date(d); monday.setDate(d.getDate()+diffToMon);
    const key = monday.toISOString().slice(0,10);
    if(!weeks[key]) weeks[key] = { low:+p.weight, high:+p.weight, sum:0, count:0 };
    weeks[key].low = Math.min(weeks[key].low, +p.weight);
    weeks[key].high = Math.max(weeks[key].high, +p.weight);
    weeks[key].sum += +p.weight;
    weeks[key].count++;
  });
  return Object.keys(weeks).sort().map(k=>({
    weekStart: k, low: weeks[k].low, high: weeks[k].high, avg: weeks[k].sum/weeks[k].count
  }));
}

function drawRangeChart(canvasId, weeks, color){
  const canvas = document.getElementById(canvasId);
  if(!canvas || weeks.length < 1) return;
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width*dpr;
  canvas.height = 160*dpr;
  ctx.scale(dpr,dpr);
  const W = rect.width, H = 160;
  const pad = {t:16, r:14, b:28, l:40};
  const cW = W-pad.l-pad.r, cH = H-pad.t-pad.b;
  const allVals = weeks.flatMap(w=>[w.low,w.high]);
  const minV = Math.min(...allVals)-1, maxV = Math.max(...allVals)+1;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle = "rgba(28,48,64,0.8)"; ctx.lineWidth = 1;
  for(let i=0;i<=3;i++){
    const y = pad.t+(cH/3)*i;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    const val = (maxV-((maxV-minV)/3)*i).toFixed(0);
    ctx.fillStyle = "#3e6474"; ctx.font = "9px system-ui"; ctx.textAlign = "right";
    ctx.fillText(val, pad.l-4, y+3);
  }
  const slotW = cW / weeks.length;
  weeks.forEach((w,i)=>{
    const x = pad.l + slotW*i + slotW/2;
    const yLow = pad.t + cH - ((w.low-minV)/(maxV-minV))*cH;
    const yHigh = pad.t + cH - ((w.high-minV)/(maxV-minV))*cH;
    const yAvg = pad.t + cH - ((w.avg-minV)/(maxV-minV))*cH;
    ctx.strokeStyle = color; ctx.lineWidth = Math.min(8, slotW*0.35); ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(x,yLow); ctx.lineTo(x,yHigh); ctx.stroke();
    ctx.beginPath(); ctx.arc(x,yAvg,3,0,Math.PI*2); ctx.fillStyle = "#fff"; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = color; ctx.stroke();
    if(i===0 || i===weeks.length-1){
      ctx.fillStyle = "#3e6474"; ctx.font = "9px system-ui"; ctx.textAlign = "center";
      ctx.fillText(new Date(w.weekStart+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}), x, H-4);
    }
  });
}

function drawLineChart(canvasId, data, color) {
  const canvas = document.getElementById(canvasId);
  if(!canvas || data.length < 2) return;
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 120 * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 120;
  const pad = {t:12, r:12, b:28, l:40};
  const cW = W - pad.l - pad.r;
  const cH = H - pad.t - pad.b;
  const vals = data.map(d => d.v);
  const minV = Math.min(...vals) - 1;
  const maxV = Math.max(...vals) + 1;
  ctx.clearRect(0, 0, W, H);
  // Grid
  ctx.strokeStyle = "rgba(28,48,64,0.8)"; ctx.lineWidth = 1;
  for(let i = 0; i <= 3; i++) {
    const y = pad.t + (cH/3)*i;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
    const val = (maxV - ((maxV-minV)/3)*i).toFixed(0);
    ctx.fillStyle = "#3e6474"; ctx.font = "9px system-ui"; ctx.textAlign = "right";
    ctx.fillText(val, pad.l-4, y+3);
  }
  // Gradient
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t+cH);
  grad.addColorStop(0, color.replace(")", ",0.3)").replace("rgb","rgba"));
  grad.addColorStop(1, color.replace(")", ",0)").replace("rgb","rgba"));
  ctx.beginPath();
  data.forEach((d,i) => {
    const x = pad.l + (i/(data.length-1))*cW;
    const y = pad.t + cH - ((d.v-minV)/(maxV-minV))*cH;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.lineTo(pad.l+cW, pad.t+cH); ctx.lineTo(pad.l, pad.t+cH); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
  // Line
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = "round";
  data.forEach((d,i) => {
    const x = pad.l + (i/(data.length-1))*cW;
    const y = pad.t + cH - ((d.v-minV)/(maxV-minV))*cH;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Dots
  data.forEach((d,i) => {
    const x = pad.l + (i/(data.length-1))*cW;
    const y = pad.t + cH - ((d.v-minV)/(maxV-minV))*cH;
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    // Value label on last dot
    if(i === data.length-1) {
      ctx.fillStyle = color; ctx.font = "bold 10px system-ui"; ctx.textAlign = "center";
      ctx.fillText(d.v+" lbs", x, y-8);
    }
  });
  // X labels
  ctx.fillStyle = "#3e6474"; ctx.font = "9px system-ui"; ctx.textAlign = "center";
  ctx.fillText(data[0].d.slice(5), pad.l, H-4);
  ctx.fillText(data[data.length-1].d.slice(5), W-pad.r, H-4);
}

const CHART_COLORS = ["#22a8be","#C9A84C","#2dba80","#e07a52","#a86bcc","#52b0e0"];

function groupExercisesByField(exercises){
  const result = [];
  const seen = {};
  exercises.forEach(ex=>{
    if(!ex.group){ result.push({type:"single", ex}); return; }
    if(seen[ex.group]){
      const entry = result.find(r=>r.type==="group"&&r.groupId===ex.group);
      if(entry) entry.exercises.push(ex);
      return;
    }
    seen[ex.group]=true;
    result.push({type:"group", groupId:ex.group, exercises:[ex]});
  });
  result.forEach(r=>{ if(r.type==="group") r.label=(r.exercises.length>=3?"Circuit ":"Superset ")+r.groupId; });
  return result;
}

function parseRestSeconds(str){
  if(!str) return null;
  const s = String(str).toLowerCase();
  const m = s.match(/(\d+(?:\.\d+)?)/);
  if(!m) return null;
  const num = parseFloat(m[1]);
  if(s.includes("min")) return Math.round(num*60);
  return Math.round(num);
}

  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS_SHORT = ["Su","Mo","Tu","We","Th","Fr","Sa"];
  const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const today = tod();

  const first = new Date(calYear,calMonth,1).getDay();
  const daysInMonth = new Date(calYear,calMonth+1,0).getDate();

  const prevMonth = () => { if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1); };
  const nextMonth = () => { if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1); };

  const getDateStr = (d) => `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const getDayName = (dateStr) => DAY_NAMES[new Date(dateStr+'T12:00:00').getDay()];

  const selDatedPlan = selDate ? datedPlans.find(p=>p.date===selDate) : null;
  const selDayName = selDate ? getDayName(selDate) : null;
  const selRecurPlan = selDayName ? plans.find(p=>p.day===selDayName) : null;
  const activePlan = selDatedPlan || selRecurPlan;

  const [showLogForm, setShowLogForm] = React.useState(false);
  const blankBlock = () => ({exercise:"", muscle:"Full Body", type:"reps", setRows:[{reps:"",weight:""},{reps:"",weight:""},{reps:"",weight:""}]});
  const [logEf, setLogEf] = React.useState({blocks:[blankBlock()],notes:"",date:today,from_plan:false,exerciseGroup:null});

    const groupMembers = ex.group ? (activePlan.exercises||[]).filter(e=>e.group===ex.group) : [ex];

function StrengthProgress({logs}) {
  const [selEx, setSelEx] = React.useState(null);
  const ref = React.useRef(null);

  // Build exercise PR history
  const exMap = {};
  [...logs].reverse().forEach(l => {
    if(!l.exercise || !l.weight || +l.weight === 0) return;
    if(!exMap[l.exercise]) exMap[l.exercise] = [];
    const existing = exMap[l.exercise].find(e => e.d === l.date);
    if(!existing || +l.weight > existing.v) {
      exMap[l.exercise] = exMap[l.exercise].filter(e => e.d !== l.date);
      exMap[l.exercise].push({d: l.date, v: +l.weight});
    }
  });

  const exList = Object.keys(exMap).filter(k => exMap[k].length >= 2).sort();
  const active = selEx || exList[0];

  React.useEffect(() => {
    if(!active || !exMap[active] || exMap[active].length < 2) return;
    setTimeout(() => {
      drawLineChart("strengthChart", exMap[active], CHART_COLORS[0]);
    }, 50);
  }, [active, logs]);

  if(exList.length === 0) return null;

  const data = exMap[active] || [];
  const first = data[0];
  const last = data[data.length-1];
  const gain = last && first ? (last.v - first.v).toFixed(1) : null;

  return (
    <div className="card" style={{marginBottom:10}}>
      <div className="clbl">Strength Progress</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        {exList.map(ex => (
          <button key={ex} onClick={() => setSelEx(ex)}
            style={{background: ex===active?"var(--teal3)":"var(--s2)",
              border:"1px solid "+(ex===active?"var(--teal)":"var(--b1)"),
              color: ex===active?"var(--teal2)":"var(--muted)",
              borderRadius:6,padding:"5px 10px",
              fontFamily:"'Clash Display',sans-serif",fontSize:10,
              fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
            {ex}
          </button>
        ))}
      </div>
      {gain!==null&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,background:"var(--s2)",borderRadius:8,padding:"10px 12px"}}>
          <div>
            <div style={{fontSize:11,color:"var(--muted)"}}>Started at</div>
            <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:18,fontWeight:700,color:"var(--txt)"}}>{first.v} lbs</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:22,fontWeight:700,color:+gain>=0?"var(--green)":"var(--red)"}}>
              {+gain>0?"+":""}{gain} lbs
            </div>
            <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1}}>Total Gain</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:"var(--muted)"}}>Current PR</div>
            <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:18,fontWeight:700,color:"var(--teal2)"}}>{last.v} lbs</div>
          </div>
        </div>
      )}
      <canvas id="strengthChart" style={{width:"100%",height:"120px",display:"block"}}></canvas>
    </div>
  );
}

function getWeekDates(dateStr){
  const d = new Date(dateStr+"T12:00:00");
  const dow = d.getDay();
  const diffToMon = dow===0?-6:1-dow;
  const monday = new Date(d); monday.setDate(d.getDate()+diffToMon);
  return Array.from({length:7},(_,i)=>{
    const dd = new Date(monday); dd.setDate(monday.getDate()+i);
    return dd.toISOString().slice(0,10);
  });
}

function nDayLabel(dateStr){
  const t = tod();
  if(dateStr===t) return "Today";
  const y = new Date(t); y.setDate(y.getDate()-1);
  if(dateStr===y.toISOString().slice(0,10)) return "Yesterday";
  return new Date(dateStr+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
}

function WorkoutHeatmap({logs}){
  const volByDate = {};
  const hasLogByDate = {};
  logs.forEach(l=>{
    const vol = (+l.sets||1)*(+l.reps||0)*(+l.weight||0);
    volByDate[l.date] = (volByDate[l.date]||0) + vol;
    hasLogByDate[l.date] = true;
  });
  const todayD = new Date(tod()+"T12:00:00");
  const DAYS = 84;
  const endDow = todayD.getDay();
  const totalCells = Math.ceil((DAYS+endDow)/7)*7;
  const cells = [];
  for(let i=totalCells-1;i>=0;i--){
    const d = new Date(todayD); d.setDate(d.getDate()-i);
    const iso = d.toISOString().slice(0,10);
    cells.push({date:iso, active: !!hasLogByDate[iso], vol: volByDate[iso]||0});
  }
  const maxVol = Math.max(1,...cells.map(c=>c.vol));
  const weeks = [];
  for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));
  const colorFor = (c) => {
    if(!c.active) return "var(--s1)";
    const ratio = c.vol/maxVol;
    if(ratio>0.66) return "var(--teal)";
    if(ratio>0.33) return "rgba(27,136,153,0.6)";
    return "rgba(27,136,153,0.35)";
  };
  return (
    <div>
      <div style={{display:"flex",gap:3,overflowX:"auto",paddingBottom:6}}>
        {weeks.map((w,wi)=>(
          <div key={wi} style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0}}>
            {w.map((c,di)=>(
              <div key={di} title={c.date+(c.active?" — logged":"")} style={{width:11,height:11,borderRadius:2,background:colorFor(c)}}/>
            ))}
          </div>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:5,marginTop:6,fontSize:9,color:"var(--muted)"}}>
        <span>Less</span>
        <div style={{width:10,height:10,borderRadius:2,background:"var(--s1)"}}/>
        <div style={{width:10,height:10,borderRadius:2,background:"rgba(27,136,153,0.35)"}}/>
        <div style={{width:10,height:10,borderRadius:2,background:"rgba(27,136,153,0.6)"}}/>
        <div style={{width:10,height:10,borderRadius:2,background:"var(--teal)"}}/>
        <span>More</span>
      </div>
    </div>
  );
}

      if(!shares.length){ setForms([]); setLoaded(true); return; }

        api(`intake_forms?id=in.(${ids})&order=created_at.desc`),

                        {(q.options||[]).map(opt=>(
                          <button key={opt} onClick={()=>setAnswers(prev=>({...prev,[q.id]:opt}))} style={{padding:9,borderRadius:8,border:"1px solid "+(answers[q.id]===opt?"var(--teal)":"var(--b1)"),background:answers[q.id]===opt?"var(--teal3)":"var(--s1)",color:answers[q.id]===opt?"var(--teal2)":"var(--muted)",fontSize:13,fontWeight:600,cursor:"pointer",textAlign:"left"}}>{opt}</button>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
                <button onClick={()=>submitForm(form)} style={{width:"100%",background:"linear-gradient(135deg,#186476,var(--teal))",color:"#fff",border:"none",borderRadius:8,padding:12,fontFamily:"'Clash Display',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}}>Submit</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function DailyCheckIn({client, toast_}){
  const [checkin,setCheckin] = useState(null);
  const [editing,setEditing] = useState(false);
  const [mood,setMood] = useState(0);
  const [energy,setEnergy] = useState(0);
  const [sleep,setSleep] = useState("");
  const [notes,setNotes] = useState("");
  const [loaded,setLoaded] = useState(false);

  useEffect(()=>{
    if(!client) return;
    api(`daily_checkins?client_id=eq.${client.id}&date=eq.${tod()}`).then(rows=>{
      const row = rows && rows[0];
      setCheckin(row||null);
      if(row){ setMood(row.mood||0); setEnergy(row.energy||0); setSleep(row.sleep_hours!=null?String(row.sleep_hours):""); setNotes(row.notes||""); }
      setLoaded(true);
    }).catch(()=>setLoaded(true));
  },[client.id]);

  const save = async () => {
    if(!mood && !energy && !sleep && !notes.trim()){ toast_("Add at least one thing before saving"); return; }
    try {
      if(checkin){
        await api(`daily_checkins?id=eq.${checkin.id}`,{method:"PATCH",body:JSON.stringify({mood:mood||null, energy:energy||null, sleep_hours:sleep?+sleep:null, notes:notes.trim()})});
        setCheckin({...checkin, mood, energy, sleep_hours:sleep?+sleep:null, notes:notes.trim()});
      } else {
        const saved = await api("daily_checkins",{method:"POST",body:JSON.stringify({client_id:client.id, date:tod(), mood:mood||null, energy:energy||null, sleep_hours:sleep?+sleep:null, notes:notes.trim()})});
        setCheckin(saved[0]);
      }
      setEditing(false);
      toast_("Checked in ✓");
    } catch(e){ toast_("Could not save check-in"); }
  };

  if(!loaded) return null;

  const MOODS = ["😞","😕","😐","🙂","😄"];
  const ENERGY = ["🪫","🔋","🔋🔋","🔋🔋🔋","⚡"];
  const inputStyle = {background:"var(--bg)",border:"1.5px solid var(--b1)",borderRadius:8,padding:11,color:"var(--txt)",fontFamily:"'Cabinet Grotesk',sans-serif",fontSize:13,outline:"none",width:"100%",marginBottom:10};

  if(checkin && !editing){
    return (
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div className="clbl" style={{marginBottom:0}}>✓ Checked In Today</div>
          <span onClick={()=>setEditing(true)} style={{fontSize:11,color:"var(--teal2)",cursor:"pointer",textDecoration:"underline"}}>Edit</span>
        </div>
        <div style={{display:"flex",gap:18,fontSize:13,flexWrap:"wrap"}}>
          {checkin.mood>0&&<div>Mood {MOODS[checkin.mood-1]}</div>}
          {checkin.energy>0&&<div>Energy {ENERGY[checkin.energy-1]}</div>}
          {checkin.sleep_hours&&<div>{checkin.sleep_hours}h sleep</div>}
        </div>
        {checkin.notes&&<div style={{fontSize:12,color:"var(--muted)",marginTop:6,fontStyle:"italic"}}>{checkin.notes}</div>}
      </div>
    );
  }

  return (
    <div className="card">
      <div className="clbl">Daily Check-In</div>
      <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>Mood</div>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {MOODS.map((m,i)=>(
          <button key={i} onClick={()=>setMood(i+1)} style={{flex:1,fontSize:20,padding:8,borderRadius:8,border:"1px solid "+(mood===i+1?"var(--teal)":"var(--b1)"),background:mood===i+1?"var(--teal3)":"var(--s1)",cursor:"pointer"}}>{m}</button>
        ))}
      </div>
      <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>Energy</div>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {ENERGY.map((e,i)=>(
          <button key={i} onClick={()=>setEnergy(i+1)} style={{flex:1,fontSize:14,padding:8,borderRadius:8,border:"1px solid "+(energy===i+1?"var(--teal)":"var(--b1)"),background:energy===i+1?"var(--teal3)":"var(--s1)",cursor:"pointer"}}>{e}</button>
        ))}
      </div>
      <input type="number" inputMode="decimal" step="0.5" placeholder="Hours of sleep last night" value={sleep} onChange={e=>setSleep(e.target.value)} style={inputStyle}/>
      <input placeholder="How's it going? (optional)" value={notes} onChange={e=>setNotes(e.target.value)} style={inputStyle}/>
      <button onClick={save} style={{width:"100%",background:"linear-gradient(135deg,#186476,var(--teal))",color:"#fff",border:"none",borderRadius:8,padding:12,fontFamily:"'Clash Display',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}}>Save Check-In</button>
    </div>
  );
}

function FoodTab({client, toast_}){
  const [nLogs,setNLogs] = useState([]);
  const [nDate,setNDate] = useState(tod());
  const [nMealTime,setNMealTime] = useState("Breakfast");
  const [nMode,setNMode] = useState("text");
  const [mealText,setMealText] = useState("");
  const [photoBase64,setPhotoBase64] = useState(null);
  const [photoMediaType,setPhotoMediaType] = useState(null);
  const [analyzing,setAnalyzing] = useState(false);
  const [result,setResult] = useState(null);
  const [waterLogs,setWaterLogs] = useState([]);
  const [listening,setListening] = useState(false);
  const recognitionRef = useRef(null);
  const baseTextRef = useRef("");
  const shouldContinueRef = useRef(false);
  const SpeechRecognitionAPI = typeof window!=="undefined" ? (window.SpeechRecognition || window.webkitSpeechRecognition) : null;

  const startListening = () => {
    if(!SpeechRecognitionAPI){ toast_("Voice input isn't supported in this browser"); return; }
    baseTextRef.current = mealText ? mealText.trim()+" " : "";
    shouldContinueRef.current = true;

    const beginSegment = () => {
      const rec = new SpeechRecognitionAPI();
      rec.continuous = false;
      rec.interimResults = true;
      rec.lang = "en-US";
      let segmentFinal = "";

      rec.onresult = (e) => {
        let f = "", i2 = "";
        for(let i=0;i<e.results.length;i++){
          if(e.results[i].isFinal) f += e.results[i][0].transcript;
          else i2 += e.results[i][0].transcript;
        }
        segmentFinal = f;
        setMealText((baseTextRef.current + f + i2).replace(/\s+/g," ").trim());
      };
      rec.onerror = (e) => {
        if(e.error === "no-speech" || e.error === "aborted") return; // let onend decide whether to restart
        shouldContinueRef.current = false;
        setListening(false);
      };
      rec.onend = () => {
        if(segmentFinal){
          baseTextRef.current = (baseTextRef.current + " " + segmentFinal).replace(/\s+/g," ").trim() + " ";
        }
        setMealText(baseTextRef.current.trim());
        if(shouldContinueRef.current){
          try { beginSegment(); } catch(err){ setListening(false); }
        } else {
          setListening(false);
        }
      };
      recognitionRef.current = rec;
      rec.start();
    };

    beginSegment();
    setListening(true);
  };

  const stopListening = () => {
    shouldContinueRef.current = false;
    if(recognitionRef.current) recognitionRef.current.stop();
    setListening(false);
  };

  useEffect(()=>{
    if(nMode!=="voice" && listening) stopListening();
  },[nMode]);

  useEffect(()=>{
    if(!client) return;
    api(`nutrition_logs?client_id=eq.${client.id}&order=created_at.asc`).then(setNLogs).catch(()=>toast_("Could not load meals"));
    api(`water_logs?client_id=eq.${client.id}`).then(setWaterLogs).catch(()=>{});
  },[client.id]);

  const waterToday = waterLogs.find(w=>w.date===nDate);
  const waterGlasses = waterToday ? waterToday.glasses : 0;
  const WATER_TARGET = 8;

  const adjustWater = async (delta) => {
    const newCount = Math.max(0, waterGlasses + delta);
    try {
      if(waterToday){
        await api(`water_logs?id=eq.${waterToday.id}`,{method:"PATCH",body:JSON.stringify({glasses:newCount,updated_at:new Date().toISOString()})});
        setWaterLogs(prev=>prev.map(w=>w.id===waterToday.id?{...w,glasses:newCount}:w));
      } else {
        const saved = await api("water_logs",{method:"POST",body:JSON.stringify({client_id:client.id,date:nDate,glasses:newCount})});
        if(saved&&saved[0]) setWaterLogs(prev=>[...prev,saved[0]]);
      }
    } catch(e){ toast_("Could not update water"); }
  };

  const clearDraft = () => {
    if(listening) stopListening();
    setMealText("");
    setPhotoBase64(null);
    setPhotoMediaType(null);
    setResult(null);
  };

  const shiftDay = (n) => {
    const d = new Date(nDate); d.setDate(d.getDate()+n);
    setNDate(d.toISOString().slice(0,10));
  };

  const onPhotoSelected = async (file) => {
    if(!file) return;
    try {
      const b64 = await fileToBase64(file);
      setPhotoBase64(b64); setPhotoMediaType(file.type||"image/jpeg"); setResult(null);
    } catch(e){ toast_("Could not read photo"); }
  };

  const runAnalysis = async () => {
    if(nMode!=="photo" && !mealText.trim()){ toast_(nMode==="voice"?"Record what you ate first":"Describe the meal first"); return; }
    if(nMode==="photo" && !photoBase64){ toast_("Choose a photo first"); return; }
    setAnalyzing(true); setResult(null);
    try {
      const r = nMode==="photo"
        ? await analyzeMealPhoto(photoBase64, photoMediaType, mealText.trim())
        : await analyzeMealText(mealText.trim());
      setResult(r);
    } catch(e){ toast_("AI analysis failed"); }
    setAnalyzing(false);
  };

  const confirmLog = async () => {
    if(!result || !client) return;
    try {
      const saved = await api("nutrition_logs",{method:"POST",body:JSON.stringify({
        client_id: client.id, date: nDate, meal_time: nMealTime,
        meal_name: result.meal_name, meal_description: mealText.trim(),
        calories: result.calories, protein_g: result.protein_g, carbs_g: result.carbs_g,
        fat_g: result.fat_g, fiber_g: result.fiber_g, quality_score: result.quality_score,
        quality_notes: result.quality_notes, serving_note: result.serving_note
      })});
      if(saved && saved[0]) setNLogs(p=>[...p, saved[0]]);
      setResult(null); setPhotoBase64(null); setPhotoMediaType(null); setMealText("");
      toast_("Meal logged ✓");
    } catch(e){ toast_("❌ Could not save meal"); }
  };

  const deleteLog = async (id) => {
    try {
      await api(`nutrition_logs?id=eq.${id}`,{method:"DELETE"});
      setNLogs(p=>p.filter(l=>l.id!==id));
      toast_("Removed");
    } catch(e){ toast_("Could not delete"); }
  };

  const dayLogs = nLogs.filter(l=>l.date===nDate);
  const totals = dayLogs.reduce((acc,m)=>{
    acc.calories += (+m.calories||0); acc.protein_g += (+m.protein_g||0);
    acc.carbs_g += (+m.carbs_g||0); acc.fat_g += (+m.fat_g||0); acc.fiber_g += (+m.fiber_g||0);
    return acc;
  },{calories:0,protein_g:0,carbs_g:0,fat_g:0,fiber_g:0});
  const calGoal = client.calories || 2000;
  const proGoal = client.protein || 150;
  const carbGoal = client.carbs || 200;
  const fatGoal = client.fat || 60;
  const calPct = Math.min((totals.calories/calGoal)*100,100);

  // Weekly averages (Mon-Sun week containing nDate)
  const weekDates = getWeekDates(nDate);
  const weekLogsAll = nLogs.filter(l=>weekDates.includes(l.date));
  const dayGroups = weekDates.map(d=>weekLogsAll.filter(l=>l.date===d));
  const loggedDayGroups = dayGroups.filter(g=>g.length>0);
  const wTotals = loggedDayGroups.reduce((acc,g)=>{
    const dt = g.reduce((a,m)=>{
      a.calories+=(+m.calories||0); a.protein_g+=(+m.protein_g||0);
      a.carbs_g+=(+m.carbs_g||0); a.fat_g+=(+m.fat_g||0);
      return a;
    },{calories:0,protein_g:0,carbs_g:0,fat_g:0});
    acc.calories+=dt.calories; acc.protein_g+=dt.protein_g;
    acc.carbs_g+=dt.carbs_g; acc.fat_g+=dt.fat_g;
    return acc;
  },{calories:0,protein_g:0,carbs_g:0,fat_g:0});
  const loggedCount = loggedDayGroups.length;
  const avgCal = loggedCount ? Math.round(wTotals.calories/loggedCount) : 0;
  const avgPro = loggedCount ? Math.round(wTotals.protein_g/loggedCount) : 0;
  const avgCarb = loggedCount ? Math.round(wTotals.carbs_g/loggedCount) : 0;
  const avgFat = loggedCount ? Math.round(wTotals.fat_g/loggedCount) : 0;
  const wLabel = new Date(weekDates[0]+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})
    + " – " + new Date(weekDates[6]+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});

  return (
    <div className="scroll">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button className="bg_" style={{width:"auto",margin:0,padding:"9px 16px"}} onClick={()=>shiftDay(-1)}>Prev</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:16,fontWeight:800}}>{nDayLabel(nDate)}</div>
          <div style={{fontSize:11,color:"var(--muted)"}}>{new Date(nDate+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric"})}</div>
        </div>
        <button className="bg_" style={{width:"auto",margin:0,padding:"9px 16px"}} disabled={nDate>=tod()} onClick={()=>shiftDay(1)}>Next</button>
      </div>

      <div className="card">
        <div className="clbl">Today's Totals</div>
        <div style={{textAlign:"center",marginBottom:12}}>
          <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:32,fontWeight:900,color:"var(--teal2)"}}>{Math.round(totals.calories)}</div>
          <div style={{fontSize:11,color:"var(--muted)"}}>of {calGoal} kcal</div>
          <div className="bar-bg" style={{marginTop:8}}><div className="bar-fill" style={{width:calPct+"%"}}/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          <MacroBox label="Protein" value={totals.protein_g} goal={proGoal} color="#4fc3f7"/>
          <MacroBox label="Carbs" value={totals.carbs_g} goal={carbGoal} color="#ffd54f"/>
          <MacroBox label="Fat" value={totals.fat_g} goal={fatGoal} color="#ef9a9a"/>
          <MacroBox label="Fiber" value={totals.fiber_g} goal={null} color="#a5d6a7"/>
        </div>
      </div>

      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div className="clbl" style={{marginBottom:0}}>Water</div>
          <span style={{fontSize:11,color:"var(--muted)"}}>{waterGlasses} of {WATER_TARGET} glasses</span>
        </div>
        <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:12,flexWrap:"wrap"}}>
          {Array.from({length:WATER_TARGET}).map((_,i)=>(
            <span key={i} style={{fontSize:22,opacity:i<waterGlasses?1:0.25,cursor:"pointer"}} onClick={()=>adjustWater(i<waterGlasses?-(waterGlasses-i):(i-waterGlasses+1))}>💧</span>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>adjustWater(-1)} style={{flex:1,background:"var(--s1)",border:"1px solid var(--b1)",color:"var(--muted)",borderRadius:8,padding:10,fontSize:16,fontWeight:700,cursor:"pointer"}}>−</button>
          <button onClick={()=>adjustWater(1)} style={{flex:1,background:"var(--teal3)",border:"1px solid var(--teal)",color:"var(--teal2)",borderRadius:8,padding:10,fontSize:16,fontWeight:700,cursor:"pointer"}}>+</button>
        </div>
      </div>

      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div className="clbl" style={{marginBottom:0}}>This Week</div>
          <span style={{fontSize:11,color:"var(--muted)"}}>{wLabel}</span>
        </div>
        {loggedCount===0 ? (
          <div style={{color:"var(--muted)",fontSize:12,fontStyle:"italic"}}>No meals logged this week yet</div>
        ) : (
          <>
            <div style={{textAlign:"center",marginBottom:10}}>
              <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:26,fontWeight:900,color:"var(--teal2)"}}>{avgCal}</div>
              <div style={{fontSize:11,color:"var(--muted)"}}>avg kcal/day · {loggedCount} of 7 days logged</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
              <MacroBox label="Avg Protein" value={avgPro} goal={null} color="#4fc3f7"/>
              <MacroBox label="Avg Carbs" value={avgCarb} goal={null} color="#ffd54f"/>
              <MacroBox label="Avg Fat" value={avgFat} goal={null} color="#ef9a9a"/>
            </div>
          </>
        )}
      </div>

      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div className="clbl" style={{marginBottom:0}}>Log a Meal</div>
          <div style={{display:"flex",gap:4,background:"var(--bg)",borderRadius:16,padding:3}}>
            <button onClick={()=>setNMode("text")} style={{padding:"5px 12px",borderRadius:13,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:nMode==="text"?"var(--teal)":"transparent",color:nMode==="text"?"#fff":"var(--muted)"}}>Text</button>
            {SpeechRecognitionAPI&&<button onClick={()=>setNMode("voice")} style={{padding:"5px 12px",borderRadius:13,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:nMode==="voice"?"var(--teal)":"transparent",color:nMode==="voice"?"#fff":"var(--muted)"}}>🎤 Voice</button>}
            <button onClick={()=>setNMode("photo")} style={{padding:"5px 12px",borderRadius:13,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:nMode==="photo"?"var(--teal)":"transparent",color:nMode==="photo"?"#fff":"var(--muted)"}}>Photo</button>
          </div>
        </div>

        <select value={nMealTime} onChange={e=>setNMealTime(e.target.value)} style={{background:"var(--bg)",border:"1.5px solid var(--b1)",borderRadius:8,padding:11,color:"var(--txt)",fontFamily:"'Cabinet Grotesk',sans-serif",fontSize:13,outline:"none",width:"100%",marginBottom:10}}>
          {MEAL_TIMES.map(t=><option key={t}>{t}</option>)}
        </select>

        {nMode==="photo" && (
          photoBase64 ? (
            <div style={{position:"relative",marginBottom:10}}>
              <img src={`data:${photoMediaType};base64,${photoBase64}`} style={{width:"100%",maxHeight:200,objectFit:"cover",borderRadius:10,display:"block"}}/>
              <button onClick={()=>{setPhotoBase64(null);setPhotoMediaType(null);}} style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.6)",color:"#fff",border:"none",borderRadius:"50%",width:28,height:28,cursor:"pointer"}}>✕</button>
            </div>
          ) : (
            <label style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:130,border:"2px dashed var(--b1)",borderRadius:10,cursor:"pointer",color:"var(--muted)",background:"var(--bg)",marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:600}}>Tap to take or upload a photo</div>
              <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>of your meal or a nutrition label</div>
              <input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>onPhotoSelected(e.target.files[0])}/>
            </label>
          )
        )}

        {nMode==="voice" && (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:10}}>
            <button
              onClick={listening?stopListening:startListening}
              style={{width:64,height:64,borderRadius:"50%",border:"none",cursor:"pointer",background:listening?"var(--red)":"var(--teal)",color:"#fff",fontSize:26,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:listening?"0 0 0 8px rgba(224,82,82,0.15)":"0 0 0 8px rgba(27,136,153,0.15)",transition:"box-shadow 0.2s"}}
            >{listening?"■":"🎤"}</button>
            <div style={{fontSize:11,color:"var(--muted)",marginTop:8}}>{listening?"Listening… tap to stop":"Tap to speak what you ate"}</div>
          </div>
        )}

        {nMode==="photo" ? (
          <input placeholder="Optional note..." value={mealText} onChange={e=>setMealText(e.target.value)} style={{background:"var(--bg)",border:"1.5px solid var(--b1)",borderRadius:8,padding:11,color:"var(--txt)",fontFamily:"'Cabinet Grotesk',sans-serif",fontSize:13,outline:"none",width:"100%",marginBottom:10}}/>
        ) : (
          <textarea placeholder={nMode==="voice"?"Your transcribed meal will appear here — feel free to edit it":"Describe your meal... e.g. 3 eggs, 2 toast, 1 tbsp butter, coffee"} value={mealText} onChange={e=>setMealText(e.target.value)} style={{background:"var(--bg)",border:"1.5px solid var(--b1)",borderRadius:8,padding:11,color:"var(--txt)",fontFamily:"'Cabinet Grotesk',sans-serif",fontSize:13,outline:"none",width:"100%",minHeight:70,resize:"vertical",marginBottom:10}}/>
        )}

        <div style={{display:"flex",gap:8}}>
          <button className="bp" style={{flex:1}} disabled={analyzing} onClick={runAnalysis}>{analyzing?"Analyzing…":"Analyze with AI"}</button>
          {(mealText.trim()||photoBase64)&&<button onClick={clearDraft} disabled={analyzing} style={{background:"var(--s1)",border:"1px solid var(--b1)",color:"var(--muted)",borderRadius:8,padding:"0 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✕</button>}
        </div>

        {result&&(
          <div style={{marginTop:12,background:"var(--bg)",borderRadius:8,padding:14,border:"1px solid var(--teal)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{result.meal_name}</div>
                <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{result.serving_note||""}</div>
              </div>
              <span style={{fontSize:11,fontWeight:700,color:result.quality_score>=8?"var(--green)":result.quality_score>=6?"var(--gold)":"var(--red)",background:"var(--soft)",padding:"2px 8px",borderRadius:10}}>{result.quality_score}/10</span>
            </div>

            </div>

            <button className="bp" onClick={confirmLog}>+ Add to Log</button>

        )}
      </div>

      {dayLogs.length===0 ? (
        <div className="empty"><span className="ei">🍽️</span>No meals logged for {nDayLabel(nDate)}</div>
      ) : (
        MEAL_TIMES.map(mt=>{

                    <span className="chip">F {m.fat_g}g</span>
                  </div>
                </div>
              ))}
            </div>
          );
        })
      )}
    </div>
  );
}

function timeAgoShort(iso){
  const mins = Math.floor((new Date() - new Date(iso)) / 60000);
  if(mins<1) return "now";
  if(mins<60) return mins+"m";
  const hrs = Math.floor(mins/60);
  if(hrs<24) return hrs+"h";
  const days = Math.floor(hrs/24);
  if(days<7) return days+"d";
  return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

function getMilestones(logs, habits, habitLogs, progressPhotos){
  const uniqueDates = new Set(logs.map(l=>l.date)).size;
  const hasPR = logs.some(l=>+l.weight>0);
  const maxStreak = (habits||[]).reduce((max,h)=>Math.max(max,getHabitStreakClient(habitLogs,h.id)),0);
  return [
    {icon:"🏋️", label:"First Workout", earned: logs.length>0},
    {icon:"🥉", label:"10 Workouts", earned: uniqueDates>=10},
    {icon:"🥈", label:"50 Workouts", earned: uniqueDates>=50},
    {icon:"🥇", label:"100 Workouts", earned: uniqueDates>=100},
    {icon:"💪", label:"First PR", earned: hasPR},
    {icon:"🔥", label:"7-Day Streak", earned: maxStreak>=7},
    {icon:"🔥🔥", label:"30-Day Streak", earned: maxStreak>=30},
    {icon:"📸", label:"Progress Photo", earned: (progressPhotos||[]).length>0},
  ];
}

function getHabitStreakClient(habitLogs, habitId){
  const set = {};
  habitLogs.filter(l=>l.habit_id===habitId).forEach(l=>{ set[l.date]=true; });
  let streak = 0;
  let cursor = new Date(tod()+"T12:00:00");
  if(!set[cursor.toISOString().slice(0,10)]) cursor.setDate(cursor.getDate()-1);
  while(set[cursor.toISOString().slice(0,10)]){
    streak++;
    cursor.setDate(cursor.getDate()-1);
  }
  return streak;
}

function getHabitLast7Client(habitLogs, habitId){
  const set = {};
  habitLogs.filter(l=>l.habit_id===habitId).forEach(l=>{ set[l.date]=true; });
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(tod()+"T12:00:00"); d.setDate(d.getDate()-i);
    const iso = d.toISOString().slice(0,10);
    days.push({date:iso, done:!!set[iso], label:d.toLocaleDateString("en-US",{weekday:"narrow"})});
  }
  return days;
}

function HabitsTab({client, habits, setHabits, habitLogs, setHabitLogs, toast_}){

    const existing = habitLogs.find(l=>l.habit_id===habitId && l.date===dateStr);
    try {
      if(existing){
        await api(`habit_logs?id=eq.${existing.id}`,{method:"DELETE"});
        setHabitLogs(prev=>prev.filter(l=>l.id!==existing.id));
      } else {
        const saved = await api("habit_logs",{method:"POST",body:JSON.stringify({habit_id:habitId, client_id:client.id, date:dateStr})});
        if(saved&&saved[0]) setHabitLogs(prev=>[...prev,saved[0]]);
      }
    } catch(e){ toast_("Could not update habit"); }
  };

  const activeHabits = habits.filter(h=>h.active!==false);

  return (
    <div className="scroll">
      {activeHabits.length===0 ? (
        <div className="empty"><span className="ei">✅</span>No habits assigned yet — ask Coach Steve to add some</div>
      ) : activeHabits.map(h=>{
        const streak = getHabitStreakClient(habitLogs, h.id);

function FilesTab({client, toast_}){
  const [resources,setResources] = useState([]);
  const [resourceUrls,setResourceUrls] = useState({});
  const [loaded,setLoaded] = useState(false);

  useEffect(()=>{
    if(!client) return;
    api(`resource_shares?client_id=eq.${client.id}&select=library_id`).then(async shares=>{
      if(!shares.length){ setResources([]); setLoaded(true); return; }
      const ids = shares.map(s=>s.library_id).join(",");
      const files = await api(`pdf_library?id=in.(${ids})&order=created_at.desc`);
      setResources(files||[]);
      setLoaded(true);
    }).catch(()=>setLoaded(true));
  },[client.id]);

  const openResource = async (r) => {
    if(resourceUrls[r.id]){ window.open(resourceUrls[r.id], "_blank"); return; }
    try {
      const res = await fetch(`${SUPA_URL}/storage/v1/object/sign/client-resources/${r.file_path}`, {
        method: "POST",
        headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify({ expiresIn: 3600 })
      });
      if(!res.ok) throw new Error("sign failed");
      const data = await res.json();
      const url = `${SUPA_URL}/storage/v1${data.signedURL}`;
      setResourceUrls(prev=>({...prev,[r.id]:url}));
      window.open(url, "_blank");
    } catch(e){ toast_("Could not open file"); }
  };

  if(!loaded) return <div className="scroll"><div className="empty">Loading…</div></div>;

  if(!resources.length){
    return <div className="scroll"><div className="empty"><span className="ei">📁</span>No files shared yet<br/>Anything Coach Steve shares with you will show up here</div></div>;
  }

  const folders = {};
  const folderOrder = [];
  resources.forEach(r=>{
    const key = r.folder || "Uncategorized";
    if(!folders[key]){ folders[key] = []; folderOrder.push(key); }
    folders[key].push(r);
  });
  folderOrder.sort((a,b)=>{
    if(a==="Uncategorized") return 1;
    if(b==="Uncategorized") return -1;
    return a.localeCompare(b);
  });

  return (
    <div className="scroll">
      {folderOrder.map(folderName=>(
        <div key={folderName} style={{marginBottom:16}}>
          <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:11,color:"var(--gold)",letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>📁 {folderName}</div>
          {folders[folderName].map(r=>(
            <div key={r.id} onClick={()=>openResource(r)} className="card" style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:8}}>
              <span style={{fontSize:22}}>{r.file_type==="pdf"?"📄":"📝"}</span>
              <span style={{fontSize:14,fontWeight:600,flex:1}}>{r.name}</span>
              <span style={{fontSize:11,color:"var(--teal2)"}}>Open ›</span>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function MessagesTab({client, messages, setMessages, toast_}){
  const [body,setBody] = useState("");
  const [pushState,setPushState] = useState(()=>{
    if(!pushSupported()) return "unsupported";
    if(isIOS() && !isStandalone()) return "ios_needs_install";
    if(typeof Notification!=="undefined" && Notification.permission==="granted") return "enabled";
    if(typeof Notification!=="undefined" && Notification.permission==="denied") return "denied";
    return "promptable";
  });
  const bottomRef = useRef(null);

  const enableNotifications = async () => {
    const res = await subscribeToPush(client.id);
    if(res.ok) { setPushState("enabled"); toast_("Notifications enabled ✓"); }
    else if(res.reason==="denied") { setPushState("denied"); }
    else { toast_("Could not enable: "+res.reason+(res.message?" ("+res.message+")":"")); }
  };

  useEffect(()=>{
    if(!client) return;
    // If permission was already granted previously, make sure a subscription row
    // actually exists in the database — it may not (e.g. if the table didn't exist
    // yet the first time permission was granted). Silent, no toast either way.
    if(pushSupported() && !(isIOS()&&!isStandalone()) && typeof Notification!=="undefined" && Notification.permission==="granted"){
      subscribeToPush(client.id);
    }
  },[client?.id]);

  useEffect(()=>{
    if(!client) return;
    const unread = messages.filter(m=>m.sender==="trainer"&&!m.read_at);
    if(!unread.length) return;
    const now = new Date().toISOString();
    setMessages(prev=>prev.map(m=>(m.sender==="trainer"&&!m.read_at)?{...m,read_at:now}:m));
    api(`messages?thread_client_id=eq.${client.id}&sender=eq.trainer&read_at=is.null`,{method:"PATCH",body:JSON.stringify({read_at:now})}).catch(()=>{});
  },[client?.id]);

  useEffect(()=>{
    if(bottomRef.current) bottomRef.current.scrollIntoView({block:"end"});
  },[messages.length]);

  const send = async () => {
    const text = body.trim();
    if(!text || !client) return;
    setBody("");
    try {
      const saved = await api("messages",{method:"POST",body:JSON.stringify({thread_client_id:client.id,sender:"client",body:text})});
      if(saved&&saved[0]) setMessages(prev=>[...prev,saved[0]]);
    } catch(e){ toast_("Could not send message"); }
  };

  const deleteMsg = async (id) => {
    try {
      await api(`messages?id=eq.${id}`,{method:"DELETE"});
      setMessages(prev=>prev.filter(m=>m.id!==id));
    } catch(e){ toast_("Could not delete message"); }
  };

  const sorted = [...messages].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));

  return (
    <div className="scroll" style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {pushState==="promptable"&&(
        <div style={{background:"var(--teal3)",border:"1px solid var(--teal)",borderRadius:8,padding:"10px 12px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
          <span style={{fontSize:12,color:"var(--teal2)"}}>Get notified when Coach Steve messages you</span>
          <button onClick={enableNotifications} style={{background:"var(--teal)",color:"#fff",border:"none",borderRadius:6,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0}}>Enable</button>
        </div>
      )}
      {pushState==="ios_needs_install"&&(
        <div style={{background:"var(--gold2)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:12,color:"var(--gold)"}}>
          To get notified of new messages on iPhone: tap the Share button in Safari, then "Add to Home Screen." Notifications only work once the app is added there.
        </div>
      )}
      {pushState==="denied"&&(
        <div style={{background:"var(--s2)",border:"1px solid var(--b1)",borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:12,color:"var(--muted)"}}>
          Notifications are blocked. You can re-enable them in your browser/phone settings for this app.
        </div>
      )}
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
        {sorted.length===0 ? (
          <div className="empty"><span className="ei">💬</span>No messages yet — send Coach Steve a message anytime</div>
        ) : sorted.map(m=>{
          const isMe = m.sender==="client";
          return (
            <div key={m.id} style={{alignSelf:isMe?"flex-end":"flex-start",maxWidth:"80%"}}>
              {m.broadcast_label&&<div style={{fontSize:9,color:"var(--gold)",marginBottom:2,textAlign:isMe?"right":"left"}}>Sent to: {m.broadcast_label}</div>}
              <div style={{background:isMe?"linear-gradient(135deg,#186476,var(--teal))":"var(--s2)",color:isMe?"#fff":"var(--txt)",border:"1px solid "+(isMe?"transparent":"var(--b1)"),borderRadius:12,padding:"9px 13px",fontSize:13,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{m.body}</div>
              <div style={{fontSize:9,color:"var(--muted)",marginTop:3,textAlign:isMe?"right":"left",display:"flex",gap:8,justifyContent:isMe?"flex-end":"flex-start"}}>
                {timeAgoShort(m.created_at)}
                {isMe&&<span onClick={()=>deleteMsg(m.id)} style={{textDecoration:"underline",cursor:"pointer"}}>delete</span>}
              </div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      <div style={{position:"sticky",bottom:0,background:"var(--bg)",paddingTop:8,display:"flex",gap:8}}>
        <textarea
          placeholder="Message Coach Steve…"
          value={body}
          onChange={e=>setBody(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(); } }}
          style={{flex:1,background:"var(--s2)",border:"1.5px solid var(--b1)",borderRadius:8,padding:11,color:"var(--txt)",fontFamily:"'Cabinet Grotesk',sans-serif",fontSize:14,outline:"none",resize:"none",minHeight:44,maxHeight:100}}
        />
        <button onClick={send} style={{background:"linear-gradient(135deg,#186476,var(--teal))",color:"#fff",border:"none",borderRadius:8,padding:"0 18px",fontWeight:700,cursor:"pointer"}}>Send</button>
      </div>
    </div>
  );
}

      if(!canvas)return;
      const ctx=canvas.getContext("2d");
      const dpr=window.devicePixelRatio||1;
      const rect=canvas.getBoundingClientRect();
      canvas.width=rect.width*dpr;
      canvas.height=160*dpr;
      ctx.scale(dpr,dpr);
      const W=rect.width,H=160;
      const sorted=[...progress].reverse();
      const weights=sorted.map(p=>+p.weight);
      const minW=Math.min(...weights)-2;
      const maxW=Math.max(...weights)+2;
      const pad={t:16,r:16,b:32,l:44};
      const cW=W-pad.l-pad.r;
      const cH=H-pad.t-pad.b;
      ctx.clearRect(0,0,W,H);
      // Grid lines
      ctx.strokeStyle="rgba(28,48,64,0.8)";
      ctx.lineWidth=1;
      for(let i=0;i<=4;i++){
        const y=pad.t+(cH/4)*i;
        ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
        const val=(maxW-((maxW-minW)/4)*i).toFixed(1);
        ctx.fillStyle="#3e6474";
        ctx.font="10px system-ui";
        ctx.textAlign="right";
        ctx.fillText(val,pad.l-6,y+3);
      }
      // Gradient fill
      const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+cH);
      grad.addColorStop(0,"rgba(26,122,138,0.3)");
      grad.addColorStop(1,"rgba(26,122,138,0)");
      ctx.beginPath();
      sorted.forEach((p,i)=>{
        const x=pad.l+(i/(sorted.length-1))*cW;
        const y=pad.t+cH-((+p.weight-minW)/(maxW-minW))*cH;
        if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });
      ctx.lineTo(pad.l+cW,pad.t+cH);ctx.lineTo(pad.l,pad.t+cH);ctx.closePath();
      ctx.fillStyle=grad;ctx.fill();
      // Line
      ctx.beginPath();
      ctx.strokeStyle="#22a8be";ctx.lineWidth=2;ctx.lineJoin="round";
      sorted.forEach((p,i)=>{
        const x=pad.l+(i/(sorted.length-1))*cW;
        const y=pad.t+cH-((+p.weight-minW)/(maxW-minW))*cH;
        if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });
      ctx.stroke();
      // Dots

        const x=pad.l+(i/(sorted.length-1))*cW;
        const y=pad.t+cH-((+p.weight-minW)/(maxW-minW))*cH;
        ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);
        ctx.fillStyle="#22a8be";ctx.fill();
      });
      // X labels (first and last)
      ctx.fillStyle="#3e6474";ctx.font="10px system-ui";ctx.textAlign="center";
      ctx.fillText(sorted[0].date.slice(5),pad.l,H-6);

            <div className="clbl">All-Time Volume</div>
            <div style={{textAlign:"center",padding:"8px 0"}}>
              <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:52,fontWeight:700,color:"var(--teal2)",lineHeight:1}}>{allVol>0?allVol.toLocaleString():"—"}</div>
              <div style={{fontSize:10,letterSpacing:2,color:"var(--muted)",textTransform:"uppercase",marginTop:3}}>Total lbs moved</div>
            </div>
          </div>
          <div className="card">
            <div className="clbl">Workout Consistency</div>
            <WorkoutHeatmap logs={logs}/>
          </div>
          <div className="srow">
            <div className="sbox"><div className="sv">{logs.length}</div><div className="slbl">Sets</div></div>
            <div className="sbox"><div className="sv">{Object.keys(grp).length}</div><div className="slbl">Sessions</div></div>
            <div className="sbox"><div className="sv g">{progress.length}</div><div className="slbl">Check-ins</div></div>
          </div>
          <div className="card">
            <div className="clbl">Muscle Groups</div>
            {Object.entries(mCnt).sort((a,b)=>b[1]-a[1]).map(([m,n])=>{
              const mx=Math.max(...Object.values(mCnt));
              return(
                <div key={m} style={{marginBottom:9}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}><span style={{fontWeight:600}}>{m}</span><span style={{color:"var(--muted)"}}>{n}</span></div>
                  <div className="bar-bg"><div className="bar-fill" style={{width:`${n/mx*100}%`}}/></div>
                </div>
              );
            })}
            {!Object.keys(mCnt).length&&<div style={{color:"var(--muted)",fontSize:12,fontStyle:"italic"}}>No data yet</div>}
          </div>
          <div className="card">
            <div className="clbl">Personal Records</div>
            {(()=>{
              const b={};
              logs.forEach(e=>{if(e.weight&&(!b[e.exercise]||+e.weight>+b[e.exercise]))b[e.exercise]=e.weight;});
              const ent=Object.entries(b).sort((a,c_)=>c_[1]-a[1]).slice(0,10);
              return ent.length?ent.map(([ex,w])=>(
                <div key={ex} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid var(--b1)"}}>
                  <span style={{fontSize:13,fontWeight:500}}>{ex}</span>
                  <span style={{fontFamily:"'Clash Display',sans-serif",fontSize:15,fontWeight:700,color:"var(--teal2)"}}>{w} lbs</span>
                </div>
              )):<div style={{color:"var(--muted)",fontSize:12,fontStyle:"italic"}}>No PRs yet</div>;
            })()}
          </div>
        </div>
      )}

      {restTimer&&(
        <div style={{position:"fixed",bottom:64,left:0,right:0,background:restTimer.remaining===0?"var(--green)":"var(--teal)",color:"#fff",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:90,boxShadow:"0 -4px 20px rgba(0,0,0,0.3)"}}>
          <div>
            <div style={{fontSize:10,opacity:0.85,textTransform:"uppercase",letterSpacing:1}}>{restTimer.remaining===0?"Rest done!":"Resting · "+restTimer.label}</div>
            <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:22,fontWeight:800}}>{restTimer.remaining===0?"Go!":`${Math.floor(restTimer.remaining/60)}:${String(restTimer.remaining%60).padStart(2,"0")}`}</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setRestTimer(p=>({...p,remaining:p.remaining+15}))} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:6,padding:"8px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>+15s</button>
            <button onClick={()=>setRestTimer(null)} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:6,padding:"8px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>✕</button>
          </div>
        </div>
      )}

      {(view==="log"||view==="today")&&<button className="fab" onClick={()=>{setEf({date:tod(),blocks:[{exercise:"",muscle:"Chest",type:"reps",setRows:[{reps:"",weight:""},{reps:"",weight:""},{reps:"",weight:""}]}],notes:"",from_plan:false,exerciseGroup:null});setPEL(null);setSAE(true);}}>＋</button>}
      {view==="progress"&&<button className="fab" onClick={()=>setSProg(true)}>＋</button>}

      <div className="bnav">
        {[{id:"today",i:"🌅",l:"Today"},{id:"plan",i:"📋",l:"Plan"},{id:"log",i:"🏋️",l:"Log"},{id:"food",i:"🍽️",l:"Food"},{id:"habits",i:"✅",l:"Habits"},{id:"files",i:"📁",l:"Files"},{id:"messages",i:"💬",l:"Messages"},{id:"progress",i:"📈",l:"Progress"},{id:"stats",i:"🏆",l:"Stats"}].map(n=>{
          const unread = n.id==="messages" ? messages.filter(m=>m.sender==="trainer"&&!m.read_at).length : 0;
          return (
          <button key={n.id} className={`bb ${view===n.id?"active":""}`} onClick={()=>setView(n.id)} style={{position:"relative"}}>
            {unread>0&&<span style={{position:"absolute",top:2,right:"calc(50% - 20px)",background:"var(--red)",color:"#fff",fontSize:9,fontWeight:800,borderRadius:8,padding:"1px 5px"}}>{unread}</span>}
            <span className="bi">{n.i}</span>{n.l}
          </button>
          );
        })}
      </div>

      {/* LOG EXERCISE */}
      {sAE&&(
        <div className="overlay" onClick={e=>e.target.classList.contains("overlay")&&(setSAE(false),setPEL(null))}>
          <div className="sheet">
            <div className="hdl"/>
            <div className="stitle">{ef.blocks.length>1?(ef.blocks.length>=3?"Circuit":"Superset"):"Log Exercise"}</div>
            {planExToLog&&<div style={{display:"inline-flex",alignItems:"center",gap:5,background:"var(--gold2)",border:"1px solid rgba(201,168,76,0.25)",borderRadius:4,padding:"2px 8px",fontSize:10,color:"var(--gold)",fontWeight:700,marginBottom:10,textTransform:"uppercase"}}>📋 From Your Plan</div>}
            {ef.blocks.map((block,bi)=>(
              <div key={bi} style={{marginBottom:14,paddingBottom:bi<ef.blocks.length-1?14:0,borderBottom:bi<ef.blocks.length-1?"1px dashed var(--b1)":"none"}}>
                {ef.blocks.length>1&&<div style={{fontSize:10,color:"var(--teal2)",fontWeight:700,marginBottom:4}}>Exercise {bi+1}</div>}
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  <div className="f" style={{flex:1,marginBottom:0}}><label>Exercise Name</label><input placeholder="e.g. Barbell Squat" value={block.exercise} onChange={e=>updateEfBlockField(bi,"exercise",e.target.value)}/></div>
                  {ef.blocks.length>1&&<button onClick={()=>removeEfBlock(bi)} style={{background:"transparent",border:"none",color:"var(--muted)",fontSize:18,cursor:"pointer",padding:"0 6px",flexShrink:0,alignSelf:"flex-end"}}>✕</button>}
                </div>
                <div className="f"><label>Muscle Group</label><select value={block.muscle} onChange={e=>updateEfBlockField(bi,"muscle",e.target.value)}>{MUSCLES.map(m=><option key={m}>{m}</option>)}</select></div>
                <div style={{display:"flex",gap:4,background:"var(--bg)",borderRadius:16,padding:3,marginBottom:8,width:"fit-content"}}>
                  <button onClick={()=>updateEfBlockField(bi,"type","reps")} style={{padding:"5px 12px",borderRadius:13,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:block.type!=="time"?"var(--teal)":"transparent",color:block.type!=="time"?"#fff":"var(--muted)"}}>Reps</button>
                  <button onClick={()=>updateEfBlockField(bi,"type","time")} style={{padding:"5px 12px",borderRadius:13,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:block.type==="time"?"var(--teal)":"transparent",color:block.type==="time"?"#fff":"var(--muted)"}}>Time</button>
                </div>
                <div style={{fontFamily:"Barlow Condensed",fontSize:9,color:"var(--muted)",letterSpacing:1,textTransform:"uppercase",marginBottom:5,marginTop:8}}>Sets</div>
                {block.setRows.map((row,i)=>(
                  <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                    <div style={{width:20,fontSize:11,color:"var(--muted)",fontWeight:700,flexShrink:0}}>{i+1}</div>
                    <input type={block.type==="time"?"text":"number"} inputMode={block.type==="time"?"text":"numeric"} placeholder={block.type==="time"?"e.g. 45 sec":"Reps"} value={row.reps} onChange={e=>updateSetRow(bi,i,"reps",e.target.value)}
                      style={{flex:1,minWidth:0,background:"var(--bg)",border:"1.5px solid var(--b1)",borderRadius:7,padding:9,color:"var(--txt)",fontFamily:"Barlow",fontSize:13,outline:"none"}}/>
                    <input type="number" inputMode="decimal" placeholder="Weight" value={row.weight} onChange={e=>updateSetRow(bi,i,"weight",e.target.value)}
                      style={{flex:1,minWidth:0,background:"var(--bg)",border:"1.5px solid var(--b1)",borderRadius:7,padding:9,color:"var(--txt)",fontFamily:"Barlow",fontSize:13,outline:"none"}}/>
                    {block.setRows.length>1&&<button onClick={()=>removeSetRow(bi,i)} style={{background:"transparent",border:"none",color:"var(--muted)",fontSize:16,cursor:"pointer",padding:"0 4px",flexShrink:0}}>✕</button>}
                  </div>
                ))}
                <button onClick={()=>addSetRow(bi)} style={{width:"100%",background:"var(--s1)",border:"1px dashed var(--b1)",borderRadius:7,padding:8,color:"var(--muted)",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Add Set</button>
              </div>
            ))}
            <button onClick={addEfBlock} style={{width:"100%",background:"var(--teal3)",border:"1px dashed var(--teal)",borderRadius:7,padding:8,color:"var(--teal2)",fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:10}}>+ Add Exercise (Superset/Circuit)</button>
            <div className="f"><label>Date</label><input type="date" value={ef.date} onChange={e=>setEf(p=>({...p,date:e.target.value}))}/></div>
            <div className="f"><label>Notes / RPE</label><input placeholder="PR, RPE 8…" value={ef.notes} onChange={e=>setEf(p=>({...p,notes:e.target.value}))}/></div>
            <button className="bp" onClick={()=>addEx()}>Log {ef.blocks.length>1?"All":"It"}</button>
            <button className="bg_" onClick={()=>{setSAE(false);setPEL(null);}}>Cancel</button>
          </div>
        </div>
      )}

      {/* LOG PROGRESS */}
      {sProg&&(
        <div className="overlay" onClick={e=>e.target.classList.contains("overlay")&&setSProg(false)}>
          <div className="sheet">
            <div className="hdl"/>
            <div className="stitle">Log Progress</div>
            <div className="fr2">
              <div className="f"><label>Weight (lbs)</label><input type="number" inputMode="decimal" placeholder="165.0" step="0.1" value={pf.weight} onChange={e=>setPf(p=>({...p,weight:e.target.value}))}/></div>
              <div className="f"><label>Body Fat %</label><input type="number" inputMode="decimal" placeholder="22.5" step="0.1" value={pf.bf} onChange={e=>setPf(p=>({...p,bf:e.target.value}))}/></div>
            </div>
            <div className="fr2">
              <div className="f"><label>Date</label><input type="date" value={pf.date} onChange={e=>setPf(p=>({...p,date:e.target.value}))}/></div>
              <div className="f"><label>Notes</label><input placeholder="Feeling great…" value={pf.notes} onChange={e=>setPf(p=>({...p,notes:e.target.value}))}/></div>
            </div>
            <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:10,color:"var(--muted)",letterSpacing:1,textTransform:"uppercase",marginTop:8,marginBottom:5}}>Measurements (optional, inches)</div>
            <div className="fr2">
              <div className="f"><label>Waist</label><input type="number" inputMode="decimal" step="0.1" placeholder="32.0" value={pf.waist} onChange={e=>setPf(p=>({...p,waist:e.target.value}))}/></div>
              <div className="f"><label>Chest</label><input type="number" inputMode="decimal" step="0.1" placeholder="40.0" value={pf.chest} onChange={e=>setPf(p=>({...p,chest:e.target.value}))}/></div>
            </div>
            <div className="fr2">
              <div className="f"><label>Arms</label><input type="number" inputMode="decimal" step="0.1" placeholder="15.0" value={pf.arms} onChange={e=>setPf(p=>({...p,arms:e.target.value}))}/></div>
              <div className="f"><label>Hips</label><input type="number" inputMode="decimal" step="0.1" placeholder="38.0" value={pf.hips} onChange={e=>setPf(p=>({...p,hips:e.target.value}))}/></div>
            </div>
            <div className="f"><label>Thighs</label><input type="number" inputMode="decimal" step="0.1" placeholder="22.0" value={pf.thighs} onChange={e=>setPf(p=>({...p,thighs:e.target.value}))}/></div>
            <button className="bp" onClick={addProg}>Save Entry</button>
            <button className="bg_" onClick={()=>setSProg(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
