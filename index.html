<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#070a0c"/>
<title>My Fitness App | Fitness 4Life 120</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070a0c;--s1:#0c1318;--s2:#111d24;--s3:#162530;
  --b1:#1c3040;--b2:#254555;
  --teal:#1b8899;--teal2:#25b5cc;--teal3:rgba(27,136,153,0.15);
  --teal4:rgba(27,136,153,0.08);
  --gold:#c9a84c;--gold2:rgba(201,168,76,0.12);
  --green:#2dba80;--red:#e05252;
  --txt:#d8eef4;--muted:#3d6678;--soft:#1a3545;--r:10px;
}
html,body{height:100%;background:var(--bg);overflow:hidden;-webkit-tap-highlight-color:transparent}
body{font-family:'Cabinet Grotesk',sans-serif;color:var(--txt)}
.app{height:100vh;max-width:430px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative}

/* LOGIN */
.login{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;overflow-y:auto}
.login-hero{background:linear-gradient(160deg,#0d2530 0%,#1b8899 100%);padding:60px 24px 48px;text-align:center;position:relative;overflow:hidden}
.login-hero::after{content:'120';position:absolute;right:-10px;bottom:-20px;font-family:'Clash Display',sans-serif;font-size:140px;font-weight:700;color:rgba(255,255,255,0.05);line-height:1;pointer-events:none}
.l-eye{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:12px;position:relative}
.l-title{font-family:'Clash Display',sans-serif;font-size:34px;font-weight:700;color:white;line-height:1.1;margin-bottom:8px;position:relative}
.l-sub{font-size:13px;color:rgba(255,255,255,0.55);position:relative;line-height:1.5}
.login-body{padding:32px 24px 40px;flex:1}
.pin-input-wrap{display:flex;justify-content:center;gap:12px;margin:24px 0}
.pin-digit{width:58px;height:68px;background:var(--s1);border:2px solid var(--b1);border-radius:10px;font-family:'Clash Display',sans-serif;font-size:28px;font-weight:700;color:var(--txt);text-align:center;outline:none;-webkit-appearance:none;transition:border-color 0.2s}
.pin-digit:focus{border-color:var(--teal2)}
.login-btn{width:100%;background:linear-gradient(135deg,#156878,var(--teal));color:white;border:none;border-radius:10px;padding:16px;font-family:'Clash Display',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:8px}
.login-btn:active{transform:scale(0.98)}
.login-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5}
.login-error{background:rgba(224,82,82,0.1);border:1px solid rgba(224,82,82,0.25);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;text-align:center;margin-top:12px}

/* TOP NAV */
.topnav{background:var(--s1);border-bottom:1px solid var(--b1);padding:14px 16px 0;flex-shrink:0;z-index:10}
.tn-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tn-greeting{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.tn-name{font-family:'Clash Display',sans-serif;font-size:20px;font-weight:700;color:var(--txt);line-height:1.1}
.icon-btn{width:36px;height:36px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;flex-shrink:0}
.icon-btn:active{transform:scale(0.9)}
.tabbar{display:flex;overflow-x:auto}
.tabbar::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:52px;padding:9px 4px;background:transparent;border:none;border-bottom:2px solid transparent;font-family:'Clash Display',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;white-space:nowrap}
.tab.active{color:var(--teal2);border-bottom-color:var(--teal2)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 100px}
.scroll::-webkit-scrollbar{display:none}
.bnav{position:absolute;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--b1);display:flex;padding:10px 0 18px;z-index:10}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-family:'Clash Display',sans-serif;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:0 2px}
.bb.active{color:var(--teal2)}
.bb .bi{font-size:21px;line-height:1}
.fab{position:absolute;bottom:72px;right:16px;width:54px;height:54px;background:linear-gradient(135deg,#156878,var(--teal));border:none;border-radius:50%;font-size:28px;color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(27,136,153,0.5);z-index:20}
.fab:active{transform:scale(0.92)}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:10px}
.clbl{font-family:'Clash Display',sans-serif;font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.today-hero{background:linear-gradient(135deg,#0d2530,#1b5060);border:1px solid rgba(27,136,153,0.25);border-radius:12px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.mbox{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:10px 6px;text-align:center}
.mbox.feat{background:linear-gradient(135deg,#156878,var(--teal));border-color:transparent}
.mv{font-family:'Clash Display',sans-serif;font-size:20px;font-weight:700;color:var(--teal2);line-height:1}
.mbox.feat .mv{color:white}
.mbox.feat .ml{color:rgba(255,255,255,0.65)}
.ml{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:3px;font-weight:700}
.ex-row{background:var(--s2);border:1px solid var(--b1);border-left:3px solid var(--teal);border-radius:8px;padding:11px 12px;margin-bottom:6px}
.ex-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.ex-name{font-size:13px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip{background:var(--soft);border-radius:4px;padding:2px 7px;font-family:'Clash Display',sans-serif;font-size:10px;font-weight:600;color:var(--muted);white-space:nowrap;flex-shrink:0}
.chip.t{color:var(--teal2);background:var(--teal3)}
.chip.g{color:var(--gold);background:var(--gold2)}
.ex-bot{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.mtag{font-size:9px;color:var(--muted);background:var(--s1);border:1px solid var(--b1);border-radius:3px;padding:1px 5px}
.del{background:transparent;border:none;color:var(--soft);cursor:pointer;font-size:14px;padding:3px 5px;flex-shrink:0}
.del:active{color:var(--red)}
.dh{display:flex;align-items:center;gap:8px;margin:14px 0 8px}
.dl{font-family:'Clash Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;flex-shrink:0}
.dline{flex:1;height:1px;background:var(--b1)}
.dc{font-size:10px;color:var(--muted);background:var(--soft);border-radius:8px;padding:2px 7px;font-weight:600;flex-shrink:0}
.srow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.sbox{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:12px 8px;text-align:center}
.sv{font-family:'Clash Display',sans-serif;font-size:24px;font-weight:700;color:var(--teal2);line-height:1}
.sv.g{color:var(--gold)}
.slbl{font-family:'Clash Display',sans-serif;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-top:3px;font-weight:600}
.plan-ex{background:var(--s2);border:1px solid var(--b1);border-left:3px solid var(--gold);border-radius:8px;padding:12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.plan-ex.done{border-left-color:var(--green);opacity:0.6}
.plan-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:13px}
.plan-check.chk{background:var(--green);border-color:var(--green);color:white}
.plan-log-btn{background:var(--teal3);border:1px solid rgba(27,136,153,0.3);color:var(--teal2);border-radius:6px;padding:5px 10px;font-family:'Clash Display',sans-serif;font-size:10px;font-weight:600;cursor:pointer;flex-shrink:0}
.week-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.week-row::-webkit-scrollbar{display:none}
.wday{flex-shrink:0;width:44px;background:var(--s2);border:1.5px solid var(--b1);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer}
.wday.active{border-color:var(--teal);background:var(--teal3)}
.wday.hp{border-color:rgba(201,168,76,0.35)}
.wd-name{font-family:'Clash Display',sans-serif;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.wd-num{font-family:'Clash Display',sans-serif;font-size:16px;font-weight:700;color:var(--txt);line-height:1;margin-top:2px}
.wday.active .wd-name,.wday.active .wd-num{color:var(--teal2)}
.wd-dot{width:5px;height:5px;background:var(--gold);border-radius:50%;margin:3px auto 0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:50;display:flex;align-items:flex-end}
.sheet{background:var(--s1);border-top:1px solid var(--b1);border-radius:16px 16px 0 0;padding:18px 18px 36px;width:100%;max-height:90vh;overflow-y:auto;animation:su 0.22s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.hdl{width:36px;height:4px;background:var(--b1);border-radius:2px;margin:0 auto 16px}
.stitle{font-family:'Clash Display',sans-serif;font-size:20px;font-weight:700;color:var(--txt);margin-bottom:16px;text-transform:uppercase;letter-spacing:0.5px}
.f{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.f label{font-family:'Clash Display',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.f input,.f select{background:var(--bg);border:1.5px solid var(--b1);border-radius:8px;padding:13px;color:var(--txt);font-family:'Cabinet Grotesk',sans-serif;font-size:15px;font-weight:500;outline:none;-webkit-appearance:none;width:100%;transition:border-color 0.2s}
.f input:focus,.f select:focus{border-color:var(--teal)}
.f select option{background:var(--s1)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.bp{width:100%;background:linear-gradient(135deg,#156878,var(--teal));color:white;border:none;border-radius:10px;padding:15px;font-family:'Clash Display',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:4px}
.bp:active{transform:scale(0.98)}
.bg_{background:transparent;border:1px solid var(--b1);color:var(--muted);border-radius:8px;padding:12px;font-family:'Clash Display',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;width:100%;margin-top:8px}
.empty{text-align:center;padding:36px 16px;color:var(--muted);font-size:12px}
.empty .ei{font-size:36px;display:block;margin-bottom:8px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:white;border-radius:20px;padding:9px 20px;font-family:'Clash Display',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;z-index:300;animation:ta 2.4s ease forwards;white-space:nowrap}
@keyframes ta{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-8px)}}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;color:var(--muted);font-family:'Clash Display',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase}
.prog-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--b1)}
.prog-row:last-child{border-bottom:none}
.delta-dn{background:rgba(45,186,128,0.12);color:var(--green);padding:2px 7px;border-radius:4px;font-family:'Clash Display',sans-serif;font-size:11px;font-weight:700}
.delta-up{background:rgba(224,82,82,0.12);color:var(--red);padding:2px 7px;border-radius:4px;font-family:'Clash Display',sans-serif;font-size:11px;font-weight:700}
.bar-bg{height:5px;background:var(--b1);border-radius:3px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;background:var(--teal);border-radius:3px}
.sdiv{height:1px;background:var(--b1);margin:12px 0}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

const SUPA_URL = "https://egzpfzolkivxgijzqtql.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnenBmem9sa2l2eGdpanpxdHFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODc2NDQsImV4cCI6MjA5MzU2MzY0NH0.RKg7hqJbOxARaC218BLLDNx9IRWnXpoUrAYUz2BE3lg";

const api = async (path, opts={}) => {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`,"Content-Type":"application/json","Prefer":"return=representation",...opts.headers},
    ...opts
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const txt=await res.text();
  return txt?JSON.parse(txt):[];
};

const MUSCLES = ["Chest","Back","Shoulders","Biceps","Triceps","Legs","Glutes","Core","Cardio","Full Body"];
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const tod = () => new Date().toISOString().slice(0,10);
const fmt = d => new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const greeting = () => { const h=new Date().getHours(); return h<12?"Good morning":h<17?"Good afternoon":"Good evening"; };
const sl = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} };
const ll = k => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;} };

function ExRow({e,onDel}){
  const vol=(+e.sets||0)*(+e.reps||0)*(+e.weight||0);
  return(
    <div className="ex-row">
      <div className="ex-top">
        <span className="ex-name">{e.exercise}</span>
        {e.weight&&<span className="chip t">{e.weight} lbs</span>}
        {e.from_plan&&<span className="chip g">Plan</span>}
        {onDel&&<button className="del" onClick={onDel}>✕</button>}
      </div>
      <div className="ex-bot">
        {e.muscle&&<span className="mtag">{e.muscle}</span>}
        {e.sets&&<span className="chip">{e.sets}×{e.reps||"?"}</span>}
        {vol>0&&<span className="chip" style={{fontSize:9,color:"var(--muted)"}}>{vol.toLocaleString()} vol</span>}
        {e.notes&&<span style={{fontSize:10,color:"var(--soft)",fontStyle:"italic"}}>{e.notes}</span>}
      </div>
    </div>
  );
}

function App(){
  const [client,setClient]   = useState(null);
  const [loading,setLoading] = useState(false);
  const [pinErr,setPinErr]   = useState("");
  const [view,setView]       = useState("today");
  const [toast,setToast]     = useState(null);
  const [logs,setLogs]       = useState([]);
  const [progress,setProg]   = useState([]);
  const [plans,setPlans]     = useState([]);
  const [trainerNote,setTNote] = useState("");

  const [sAE,setSAE]   = useState(false);
  const [sProg,setSProg] = useState(false);
  const [planDay,setPlanDay] = useState(DAYS[new Date().getDay()===0?6:new Date().getDay()-1]);
  const [checked,setChecked] = useState({});
  const [planExToLog,setPEL] = useState(null);

  const [ef,setEf] = useState({date:tod(),exercise:"",sets:"",reps:"",weight:"",muscle:"Chest",notes:"",from_plan:false});
  const [pf,setPf] = useState({date:tod(),weight:"",bf:"",notes:""});
  const [pin,setPin] = useState(["","","",""]);
  const pinRefs = [useRef(),useRef(),useRef(),useRef()];

  const toast_ = m => {setToast(m);setTimeout(()=>setToast(null),2400);};

  // Auto-login from localStorage
  useEffect(()=>{
    const saved = ll("f4l_client_id");
    if(saved) loadClientById(saved);
  },[]);

  const loadClientById = async (id) => {
    setLoading(true);
    try {
      const [c,l,pr,pl,tn] = await Promise.all([
        api(`clients?id=eq.${id}&select=*`),
        api(`workout_logs?client_id=eq.${id}&order=created_at.desc`),
        api(`progress_logs?client_id=eq.${id}&order=date.desc`),
        api(`workout_plans?client_id=eq.${id}&order=day.asc`),
        api(`trainer_notes?client_id=eq.${id}&order=created_at.desc&limit=1`),
      ]);
      if(c.length){
        setClient(c[0]); setLogs(l); setProg(pr); setPlans(pl);
        setTNote(tn[0]?.message||"");
        sl("f4l_client_id",id);
      }
    } catch(e){setPinErr("Could not connect. Check your connection.");}
    setLoading(false);
  };

  const loginWithPin = async () => {
    const p = pin.join("");
    if(p.length<4){setPinErr("Enter your 4-digit PIN");return;}
    setLoading(true); setPinErr("");
    try {
      const res = await api(`clients?pin=eq.${p}&select=*`);
      if(!res.length){setPinErr("PIN not found — check with your trainer");setLoading(false);return;}
      await loadClientById(res[0].id);
    } catch(e){setPinErr("Connection error. Try again.");setLoading(false);}
  };

  const handlePinInput = (i,v) => {
    const d=v.replace(/\D/g,"").slice(-1);
    const np=[...pin]; np[i]=d; setPin(np);
    if(d&&i<3) pinRefs[i+1].current?.focus();
  };

  const handlePinKey = (i,e) => {
    if(e.key==="Backspace"&&!pin[i]&&i>0){pinRefs[i-1].current?.focus();}
    if(e.key==="Enter") loginWithPin();
  };

  const addEx = async () => {
    if(!ef.exercise.trim()||!client) return;
    try {
      const [entry] = await api("workout_logs",{method:"POST",body:JSON.stringify({client_id:client.id,exercise:ef.exercise.trim(),sets:ef.sets,reps:ef.reps,weight:ef.weight,muscle:ef.muscle,notes:ef.notes,date:ef.date,from_plan:ef.from_plan})});
      setLogs(p=>[entry,...p]);
      setEf(p=>({...p,exercise:"",sets:"",reps:"",weight:"",notes:"",from_plan:false}));
      setSAE(false); setPEL(null); toast_("Logged ✓");
    } catch(e){toast_("❌ Could not save");}
  };

  const delEx = async (id) => {
    try {
      await api(`workout_logs?id=eq.${id}`,{method:"DELETE"});
      setLogs(p=>p.filter(e=>e.id!==id));
    } catch{}
  };

  const addProg = async () => {
    if(!pf.weight||!client) return;
    try {
      const [entry] = await api("progress_logs",{method:"POST",body:JSON.stringify({client_id:client.id,weight:+pf.weight,body_fat:pf.bf?+pf.bf:null,notes:pf.notes,date:pf.date})});
      setProg(p=>[entry,...p].sort((a,b)=>b.date.localeCompare(a.date)));
      setSProg(false); setPf({date:tod(),weight:"",bf:"",notes:""}); toast_("Progress saved ✓");
    } catch(e){toast_("❌ Could not save");}
  };

  const logPlanEx = ex => {
    setEf({date:tod(),exercise:ex.name,sets:ex.sets+"",reps:ex.reps+"",weight:"",muscle:ex.muscle||"Full Body",notes:"",from_plan:true});
    setPEL(ex); setSAE(true);
  };

  const todayLogs = logs.filter(e=>e.date===tod());
  const todayVol  = todayLogs.reduce((a,e)=>a+((+e.sets||0)*(+e.reps||0)*(+e.weight||0)),0);
  const grp       = logs.reduce((a,e)=>{if(!a[e.date])a[e.date]=[];a[e.date].push(e);return a;},{});
  const sdates    = Object.keys(grp).sort((a,b)=>b.localeCompare(a));
  const allVol    = logs.reduce((a,e)=>a+((+e.sets||0)*(+e.reps||0)*(+e.weight||0)),0);
  const mCnt      = logs.reduce((a,e)=>{a[e.muscle]=(a[e.muscle]||0)+1;return a;},{});
  const latestP   = progress[0];
  const prevP     = progress[1];
  const wDelta    = latestP&&prevP?(latestP.weight-prevP.weight).toFixed(1):null;

  const weekDays  = Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-d.getDay()+i+1);
    return {name:DAYS[i],date:d.toISOString().slice(0,10),num:d.getDate()};
  });
  const dayPlan = plans.find(p=>p.day===planDay);

  if(loading) return <div className="loading">Connecting…</div>;

  // LOGIN SCREEN
  if(!client){
    return(
      <div className="login">
        {toast&&<div className="toast">{toast}</div>}
        <div className="login-hero">
          <div className="l-eye">Fitness 4Life 120</div>
          <div className="l-title">Your Personal Fitness App</div>
          <div className="l-sub">Enter your 4-digit PIN from your trainer to get started</div>
        </div>
        <div className="login-body">
          <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:11,color:"var(--muted)",letterSpacing:2,textTransform:"uppercase",textAlign:"center",marginBottom:4}}>Enter Your PIN</div>
          <div className="pin-input-wrap">
            {[0,1,2,3].map(i=>(
              <input key={i} ref={pinRefs[i]} className="pin-digit" type="tel" inputMode="numeric" maxLength={1} value={pin[i]} onChange={e=>handlePinInput(i,e.target.value)} onKeyDown={e=>handlePinKey(i,e)}/>
            ))}
          </div>
          {pinErr&&<div className="login-error">{pinErr}</div>}
          <button className="login-btn" onClick={loginWithPin}>Access My App →</button>
          <div className="login-hint">Your PIN was provided by your Fitness 4Life 120 trainer.<br/>Contact your trainer if you don't have one.</div>
          <div style={{textAlign:"center",fontSize:10,color:"var(--muted)",marginTop:24,letterSpacing:1}}>"Empowering You to Live the Full 120" · Gen. 6:3</div>
        </div>
      </div>
    );
  }

  return(
    <div className="app">
      {toast&&<div className="toast">{toast}</div>}

      <div className="topnav">
        <div className="tn-row">
          <div>
            <div className="tn-greeting">{greeting()}</div>
            <div className="tn-name">{client.name.split(" ")[0]} 💪</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            {trainerNote&&<div className="icon-btn" onClick={()=>setView("today")}>📣</div>}
            <div className="icon-btn" title="Log out" onClick={()=>{sl("f4l_client_id",null);setClient(null);setPin(["","","",""]);setView("today");}}>🚪</div>
          </div>
        </div>
        <div className="tabbar">
          {["today","plan","log","progress","stats"].map(v=>(
            <button key={v} className={`tab ${view===v?"active":""}`} onClick={()=>setView(v)}>
              {v==="today"?"Today":v==="plan"?"My Plan":v[0].toUpperCase()+v.slice(1)}
            </button>
          ))}
        </div>
      </div>

      {/* TODAY */}
      {view==="today"&&(
        <div className="scroll">
          {trainerNote&&(
            <div style={{background:"var(--gold2)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:12,color:"var(--gold)",lineHeight:1.5}}>
              <span style={{fontWeight:700,display:"block",marginBottom:3,fontSize:10,letterSpacing:1,textTransform:"uppercase"}}>📣 From Your Trainer</span>
              {trainerNote}
            </div>
          )}
          <div className="today-hero">
            <div style={{fontSize:10,color:"var(--gold)",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
            <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:22,fontWeight:700,color:"white",marginBottom:4}}>{todayLogs.length===0?"Let's get to work":"Keep pushing! 🔥"}</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.45)"}}>{todayLogs.length} exercise{todayLogs.length!==1?"s":""} today{todayVol>0?` · ${todayVol.toLocaleString()} lbs`:""}</div>
          </div>
          {client.calories>0&&(
            <div className="card">
              <div className="clbl">Your Daily Targets</div>
              <div className="macro-row">
                <div className="mbox feat"><div className="mv">{client.calories}</div><div className="ml">Cal</div></div>
                <div className="mbox"><div className="mv" style={{color:"var(--teal2)"}}>{client.protein}g</div><div className="ml">Protein</div></div>
                <div className="mbox"><div className="mv" style={{color:"var(--green)"}}>{client.carbs}g</div><div className="ml">Carbs</div></div>
                <div className="mbox"><div className="mv" style={{color:"var(--gold)"}}>{client.fat}g</div><div className="ml">Fat</div></div>
              </div>
            </div>
          )}
          {latestP&&(
            <div className="card" style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{flex:1}}>
                <div className="clbl" style={{marginBottom:4}}>Current Weight</div>
                <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:30,fontWeight:700,color:"var(--teal2)",lineHeight:1}}>{latestP.weight} <span style={{fontSize:14,color:"var(--muted)"}}>lbs</span></div>
                {latestP.body_fat&&<div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{latestP.body_fat}% body fat</div>}
              </div>
              {wDelta!==null&&<span className={+wDelta<0?"delta-dn":"delta-up"}>{+wDelta>0?"+":""}{wDelta} lbs</span>}
            </div>
          )}
          {todayLogs.length>0&&(
            <>
              <div className="dh"><span className="dl">Today</span><div className="dline"/><span className="dc">{todayLogs.length}</span></div>
              {todayLogs.map(e=><ExRow key={e.id} e={e} onDel={()=>delEx(e.id)}/>)}
            </>
          )}
        </div>
      )}

      {/* PLAN */}
      {view==="plan"&&(
        <div className="scroll">
          {plans.length===0
            ?<div className="empty"><span className="ei">📋</span><div style={{fontWeight:700,marginBottom:6}}>No plan assigned yet</div>Your trainer will add your workout plan here soon.</div>
            :(
              <>
                <div className="week-row">
                  {weekDays.map(d=>{
                    const hp=plans.find(p=>p.day===d.name);
                    return(
                      <div key={d.name} className={`wday ${planDay===d.name?"active":""} ${hp?"hp":""}`} onClick={()=>setPlanDay(d.name)}>
                        <div className="wd-name">{d.name}</div>
                        <div className="wd-num">{d.num}</div>
                        {hp&&<div className="wd-dot"/>}
                      </div>
                    );
                  })}
                </div>
                {dayPlan?(
                  <>
                    <div style={{background:"var(--gold2)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:8,padding:"10px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:14,fontWeight:700,color:"var(--gold)"}}>{planDay} — {dayPlan.label}</div>
                        <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{(dayPlan.exercises||[]).length} exercises</div>
                      </div>
                      <span style={{fontSize:20}}>💪</span>
                    </div>
                    {(dayPlan.exercises||[]).map((ex,i)=>{
                      const key=`${planDay}_${i}`;
                      const done=checked[key];
                      return(
                        <div key={i} className={`plan-ex ${done?"done":""}`}>
                          <div className={`plan-check ${done?"chk":""}`} onClick={()=>setChecked(p=>({...p,[key]:!p[key]}))}>
                            {done?"✓":""}
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ex.name}</div>
                            <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{ex.sets} sets × {ex.reps} reps{ex.muscle?` · ${ex.muscle}`:""}</div>
                          </div>
                          <button className="plan-log-btn" onClick={()=>logPlanEx(ex)}>Log It</button>
                        </div>
                      );
                    })}
                  </>
                ):(
                  <div className="empty" style={{paddingTop:20}}><span className="ei">🧘</span>Rest day — recover well</div>
                )}
              </>
            )
          }
        </div>
      )}

      {/* LOG */}
      {view==="log"&&(
        <div className="scroll">
          <div className="srow">
            <div className="sbox"><div className="sv">{todayLogs.length}</div><div className="slbl">Today</div></div>
            <div className="sbox"><div className="sv">{logs.length}</div><div className="slbl">Total</div></div>
            <div className="sbox"><div className="sv g">{Object.keys(grp).length}</div><div className="slbl">Sessions</div></div>
          </div>
          {sdates.length===0
            ?<div className="empty"><span className="ei">🏋️</span>No workouts yet<br/>Tap + to log your first</div>
            :sdates.map(d=>(
              <div key={d}>
                <div className="dh"><span className="dl">{fmt(d)}</span><div className="dline"/><span className="dc">{grp[d].length}</span></div>
                {grp[d].map(e=><ExRow key={e.id} e={e} onDel={()=>delEx(e.id)}/>)}
              </div>
            ))
          }
        </div>
      )}

      {/* PROGRESS */}
      {view==="progress"&&(
        <div className="scroll">
          {latestP&&(
            <div className="card" style={{textAlign:"center",padding:"18px 14px"}}>
              <div className="clbl">Current Weight</div>
              <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:52,fontWeight:700,color:"var(--teal2)",lineHeight:1}}>{latestP.weight}</div>
              <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>lbs · {fmt(latestP.date)}</div>
              {latestP.body_fat&&<div style={{marginTop:6,fontSize:14,color:"var(--gold)",fontWeight:700}}>{latestP.body_fat}% Body Fat</div>}
              {wDelta!==null&&<div style={{marginTop:10}}><span className={+wDelta<0?"delta-dn":"delta-up"}>{+wDelta>0?"+":""}{wDelta} lbs since last</span></div>}
            </div>
          )}
          {progress.length>=2&&(
            <div className="card">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:11,color:"var(--muted)"}}>Start: <strong style={{color:"var(--txt)"}}>{progress[progress.length-1].weight} lbs</strong></div>
                  <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>Now: <strong style={{color:"var(--txt)"}}>{latestP.weight} lbs</strong></div>
                </div>
                <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:28,fontWeight:700,color:latestP.weight<progress[progress.length-1].weight?"var(--green)":"var(--red)"}}>
                  {(latestP.weight-progress[progress.length-1].weight)>0?"+":""}{(latestP.weight-progress[progress.length-1].weight).toFixed(1)}
                </div>
              </div>
            </div>
          )}
          <div className="card">
            <div className="clbl">History</div>
            {progress.length===0
              ?<div style={{color:"var(--muted)",fontSize:12,fontStyle:"italic",padding:"8px 0"}}>No entries yet — tap + to log</div>
              :progress.map((p,i)=>{
                const nxt=progress[i+1];
                const d=nxt?(p.weight-nxt.weight).toFixed(1):null;
                return(
                  <div className="prog-row" key={p.id}>
                    <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:11,color:"var(--gold)",fontWeight:600,width:80,flexShrink:0}}>{p.date}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:"var(--teal2)"}}>{p.weight} lbs</div>
                      {p.body_fat&&<div style={{fontSize:11,color:"var(--muted)"}}>{p.body_fat}% BF</div>}
                      {p.notes&&<div style={{fontSize:11,color:"var(--soft)",fontStyle:"italic"}}>{p.notes}</div>}
                    </div>
                    {d!==null&&<span className={+d<0?"delta-dn":"delta-up"}>{+d>0?"+":""}{d}</span>}
                  </div>
                );
              })
            }
          </div>
        </div>
      )}

      {/* STATS */}
      {view==="stats"&&(
        <div className="scroll">
          <div className="card">
            <div className="clbl">All-Time Volume</div>
            <div style={{textAlign:"center",padding:"8px 0"}}>
              <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:52,fontWeight:700,color:"var(--teal2)",lineHeight:1}}>{allVol>0?allVol.toLocaleString():"—"}</div>
              <div style={{fontSize:10,letterSpacing:2,color:"var(--muted)",textTransform:"uppercase",marginTop:3}}>Total lbs moved</div>
            </div>
          </div>
          <div className="srow">
            <div className="sbox"><div className="sv">{logs.length}</div><div className="slbl">Sets</div></div>
            <div className="sbox"><div className="sv">{Object.keys(grp).length}</div><div className="slbl">Sessions</div></div>
            <div className="sbox"><div className="sv g">{progress.length}</div><div className="slbl">Check-ins</div></div>
          </div>
          <div className="card">
            <div className="clbl">Muscle Groups</div>
            {Object.entries(mCnt).sort((a,b)=>b[1]-a[1]).map(([m,n])=>{
              const mx=Math.max(...Object.values(mCnt));
              return(
                <div key={m} style={{marginBottom:9}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}><span style={{fontWeight:600}}>{m}</span><span style={{color:"var(--muted)"}}>{n}</span></div>
                  <div className="bar-bg"><div className="bar-fill" style={{width:`${n/mx*100}%`}}/></div>
                </div>
              );
            })}
            {!Object.keys(mCnt).length&&<div style={{color:"var(--muted)",fontSize:12,fontStyle:"italic"}}>No data yet</div>}
          </div>
          <div className="card">
            <div className="clbl">Personal Records</div>
            {(()=>{
              const b={};
              logs.forEach(e=>{if(e.weight&&(!b[e.exercise]||+e.weight>+b[e.exercise]))b[e.exercise]=e.weight;});
              const ent=Object.entries(b).sort((a,c_)=>c_[1]-a[1]).slice(0,10);
              return ent.length?ent.map(([ex,w])=>(
                <div key={ex} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid var(--b1)"}}>
                  <span style={{fontSize:13,fontWeight:500}}>{ex}</span>
                  <span style={{fontFamily:"'Clash Display',sans-serif",fontSize:15,fontWeight:700,color:"var(--teal2)"}}>{w} lbs</span>
                </div>
              )):<div style={{color:"var(--muted)",fontSize:12,fontStyle:"italic"}}>No PRs yet</div>;
            })()}
          </div>
        </div>
      )}

      {(view==="log"||view==="today")&&<button className="fab" onClick={()=>{setEf(p=>({...p,date:tod(),from_plan:false}));setSAE(true);}}>＋</button>}
      {view==="progress"&&<button className="fab" onClick={()=>setSProg(true)}>＋</button>}

      <div className="bnav">
        {[{id:"today",i:"🌅",l:"Today"},{id:"plan",i:"📋",l:"Plan"},{id:"log",i:"🏋️",l:"Log"},{id:"progress",i:"📈",l:"Progress"},{id:"stats",i:"🏆",l:"Stats"}].map(n=>(
          <button key={n.id} className={`bb ${view===n.id?"active":""}`} onClick={()=>setView(n.id)}>
            <span className="bi">{n.i}</span>{n.l}
          </button>
        ))}
      </div>

      {/* LOG EXERCISE */}
      {sAE&&(
        <div className="overlay" onClick={e=>e.target.classList.contains("overlay")&&(setSAE(false),setPEL(null))}>
          <div className="sheet">
            <div className="hdl"/>
            <div className="stitle">Log Exercise</div>
            {planExToLog&&<div style={{display:"inline-flex",alignItems:"center",gap:5,background:"var(--gold2)",border:"1px solid rgba(201,168,76,0.25)",borderRadius:4,padding:"2px 8px",fontSize:10,color:"var(--gold)",fontWeight:700,marginBottom:10,textTransform:"uppercase"}}>📋 From Your Plan</div>}
            <div className="f"><label>Exercise Name</label><input placeholder="e.g. Barbell Squat" value={ef.exercise} onChange={e=>setEf(p=>({...p,exercise:e.target.value}))}/></div>
            <div className="fr3">
              <div className="f"><label>Sets</label><input type="number" inputMode="numeric" placeholder="4" value={ef.sets} onChange={e=>setEf(p=>({...p,sets:e.target.value}))}/></div>
              <div className="f"><label>Reps</label><input type="number" inputMode="numeric" placeholder="10" value={ef.reps} onChange={e=>setEf(p=>({...p,reps:e.target.value}))}/></div>
              <div className="f"><label>Weight (lbs)</label><input type="number" inputMode="decimal" placeholder="135" value={ef.weight} onChange={e=>setEf(p=>({...p,weight:e.target.value}))}/></div>
            </div>
            <div className="fr2">
              <div className="f"><label>Muscle Group</label><select value={ef.muscle} onChange={e=>setEf(p=>({...p,muscle:e.target.value}))}>{MUSCLES.map(m=><option key={m}>{m}</option>)}</select></div>
              <div className="f"><label>Date</label><input type="date" value={ef.date} onChange={e=>setEf(p=>({...p,date:e.target.value}))}/></div>
            </div>
            <div className="f"><label>Notes / RPE</label><input placeholder="PR, RPE 8…" value={ef.notes} onChange={e=>setEf(p=>({...p,notes:e.target.value}))}/></div>
            <button className="bp" onClick={addEx}>Log It</button>
            <button className="bg_" onClick={()=>{setSAE(false);setPEL(null);}}>Cancel</button>
          </div>
        </div>
      )}

      {/* LOG PROGRESS */}
      {sProg&&(
        <div className="overlay" onClick={e=>e.target.classList.contains("overlay")&&setSProg(false)}>
          <div className="sheet">
            <div className="hdl"/>
            <div className="stitle">Log Progress</div>
            <div className="fr2">
              <div className="f"><label>Weight (lbs)</label><input type="number" inputMode="decimal" placeholder="165.0" step="0.1" value={pf.weight} onChange={e=>setPf(p=>({...p,weight:e.target.value}))}/></div>
              <div className="f"><label>Body Fat %</label><input type="number" inputMode="decimal" placeholder="22.5" step="0.1" value={pf.bf} onChange={e=>setPf(p=>({...p,bf:e.target.value}))}/></div>
            </div>
            <div className="fr2">
              <div className="f"><label>Date</label><input type="date" value={pf.date} onChange={e=>setPf(p=>({...p,date:e.target.value}))}/></div>
              <div className="f"><label>Notes</label><input placeholder="Feeling great…" value={pf.notes} onChange={e=>setPf(p=>({...p,notes:e.target.value}))}/></div>
            </div>
            <button className="bp" onClick={addProg}>Save Entry</button>
            <button className="bg_" onClick={()=>setSProg(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
